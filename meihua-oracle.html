    '8-1':['地天泰','小往大來，吉亨'],'8-2':['地澤臨','元亨利貞'],'8-3':['地火明夷','利艱貞'],'8-4':['地雷復','亨，出入無疾'],'8-5':['地風升','元亨，用見大人'],'8-6':['地水師','貞，丈人吉，無咎'],'8-7':['地山謙','亨，君子有終'],'8-8':['坤為地','元亨，利牝馬之貞']

  // ===== 五行生剋 =====
  const WUXING_SHENG = { '木':'火','火':'土','土':'金','金':'水','水':'木' };
  const WUXING_KE = { '木':'土','土':'水','水':'火','火':'金','金':'木' };

  function wuxingRelation(wx1, wx2) {
    if (wx1 === wx2) return { relation: '比和', desc: '體用相同，平穩之象', tag: 'neutral' };
    if (WUXING_SHENG[wx1] === wx2) return { relation: '體生用', desc: '體洩氣於用，稍有消耗', tag: 'neutral' };
    if (WUXING_SHENG[wx2] === wx1) return { relation: '用生體', desc: '用生體，大吉之象', tag: 'good' };
    if (WUXING_KE[wx1] === wx2) return { relation: '體剋用', desc: '體強剋用，有利可圖', tag: 'good' };
    if (WUXING_KE[wx2] === wx1) return { relation: '用剋體', desc: '用剋體，不利之象', tag: 'bad' };
    return { relation: '無', desc: '', tag: 'neutral' };
  }

  // ===== 起卦引擎 =====
  function calculateGua(upperNum, lowerNum, yaoNum) {
    const upper = ((upperNum - 1) % 8) + 1;
    const lower = ((lowerNum - 1) % 8) + 1;
    const yao = ((yaoNum - 1) % 6) + 1;
    return processGua(upper, lower, yao);
  }

  function processGua(upperIdx, lowerIdx, yaoPos) {
    const upperTri = TRIGRAMS[upperIdx];
    const lowerTri = TRIGRAMS[lowerIdx];

    // 本卦六爻（從下到上：下卦3爻 + 上卦3爻）
    const mainLines = [...lowerTri.lines, ...upperTri.lines];
    const hexKey = `${upperIdx}-${lowerIdx}`;
    const mainHex = H[hexKey];

    // 互卦：2,3,4爻為下，3,4,5爻為上（index 1,2,3 和 2,3,4）
    const mutualLowerLines = [mainLines[1], mainLines[2], mainLines[3]];
    const mutualUpperLines = [mainLines[2], mainLines[3], mainLines[4]];
    const mutualLowerIdx = findTrigramIndex(mutualLowerLines);
    const mutualUpperIdx = findTrigramIndex(mutualUpperLines);
    const mutualKey = `${mutualUpperIdx}-${mutualLowerIdx}`;
    const mutualHex = H[mutualKey];

    // 變卦：動爻陰陽互換
    const changedLines = [...mainLines];
    changedLines[yaoPos - 1] = changedLines[yaoPos - 1] === 1 ? 0 : 1;
    const changedLowerLines = changedLines.slice(0, 3);
    const changedUpperLines = changedLines.slice(3, 6);
    const changedLowerIdx = findTrigramIndex(changedLowerLines);
    const changedUpperIdx = findTrigramIndex(changedUpperLines);
    const changedKey = `${changedUpperIdx}-${changedLowerIdx}`;
    const changedHex = H[changedKey];

    // 體用判定
    const isYaoInUpper = yaoPos >= 4;
    const tiIdx = isYaoInUpper ? lowerIdx : upperIdx;
    const yongIdx = isYaoInUpper ? upperIdx : lowerIdx;
    const tiTri = TRIGRAMS[tiIdx];
    const yongTri = TRIGRAMS[yongIdx];
    const tiyong = wuxingRelation(tiTri.element, yongTri.element);

    return {
      main: { lines: mainLines, name: mainHex[0], judgement: mainHex[1], upperIdx, lowerIdx, upper: upperTri, lower: lowerTri },
      mutual: { lines: [...mutualLowerLines, ...mutualUpperLines], name: mutualHex[0], judgement: mutualHex[1], upperIdx: mutualUpperIdx, lowerIdx: mutualLowerIdx, upper: TRIGRAMS[mutualUpperIdx], lower: TRIGRAMS[mutualLowerIdx] },
      changed: { lines: changedLines, name: changedHex[0], judgement: changedHex[1], upperIdx: changedUpperIdx, lowerIdx: changedLowerIdx, upper: TRIGRAMS[changedUpperIdx], lower: TRIGRAMS[changedLowerIdx] },
      yaoPos,
      ti: tiTri,
      yong: yongTri,
      tiyong,
      isYaoInUpper
    };
  }

  function findTrigramIndex(lines) {
    for (let i = 1; i <= 8; i++) {
      const t = TRIGRAMS[i];
      if (t.lines[0] === lines[0] && t.lines[1] === lines[1] && t.lines[2] === lines[2]) return i;
    }
    return 8;
  }

  // ===== 四種起卦 =====
  function numberGua(n1, n2, n3) {
    return calculateGua(n1, n2, n1 + n2 + n3);
  }

  function timeGua() {
    const now = new Date();
    const lunar = Lunar.fromDate(now);
    const yearNum = Math.abs(lunar.getYear()) % 12 || 12;
    const month = lunar.getMonth();
    const day = lunar.getDay();
    const hour = Math.floor((now.getHours() + 1) / 2) % 12 || 12;

    const upperNum = yearNum + Math.abs(month) + day;
    const lowerNum = upperNum + hour;
    return calculateGua(upperNum, lowerNum, lowerNum);
  }

  function textGua(text) {
    const len = text.length;
    if (len === 0) return null;
    if (len === 1) return calculateGua(len, len, len);
    const half = Math.ceil(len / 2);
    return calculateGua(half, len - half, len);
  }

  function randomGua() {
    const n1 = Math.floor(Math.random() * 999) + 1;
    const n2 = Math.floor(Math.random() * 999) + 1;
    const n3 = Math.floor(Math.random() * 999) + 1;
    return calculateGua(n1, n2, n1 + n2 + n3);
  }

  // ===== Canvas 卦象繪製 =====
  function drawHexagram(canvasId, lines, yaoPos, isMain) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = 120 * dpr; canvas.height = 130 * dpr;
    canvas.style.width = '120px'; canvas.style.height = '130px';
    ctx.scale(dpr, dpr);

    const cx = 60;
    const lineW = 80, lineH = 8, gap = 14;
    const startY = 110;

    for (let i = 0; i < 6; i++) {
      const y = startY - i * (lineH + gap);
      const isYao = isMain && (i + 1) === yaoPos;
      const color = isYao ? '#c9a84c' : '#e8e4dc';
      ctx.fillStyle = color;

      if (lines[i] === 1) {
        // 陽爻
        ShareCard.roundRect(ctx, cx - lineW / 2, y, lineW, lineH, 2);
        ctx.fill();
      } else {
        // 陰爻
        const segW = (lineW - 10) / 2;
        ShareCard.roundRect(ctx, cx - lineW / 2, y, segW, lineH, 2);
        ctx.fill();
        ShareCard.roundRect(ctx, cx + 5, y, segW, lineH, 2);
        ctx.fill();
      }

      if (isYao) {
        ctx.font = '10px "Noto Sans TC", sans-serif';
        ctx.fillStyle = '#c9a84c';
        ctx.textAlign = 'left';
        ctx.fillText('◯', cx + lineW / 2 + 4, y + lineH - 1);
      }
    }
  }

  // ===== Render =====
  let lastResult = null;

  function renderResult(result) {
    lastResult = result;
    const section = document.getElementById('resultSection');
    section.classList.add('visible');

    drawHexagram('hexMain', result.main.lines, result.yaoPos, true);
    drawHexagram('hexMutual', result.mutual.lines, 0, false);
    drawHexagram('hexChanged', result.changed.lines, 0, false);

    document.getElementById('hexMainName').textContent = result.main.name;
    document.getElementById('hexMainElement').textContent = `${result.main.upper.name}${result.main.upper.symbol} 上 / ${result.main.lower.name}${result.main.lower.symbol} 下`;
    document.getElementById('hexMutualName').textContent = result.mutual.name;
    document.getElementById('hexMutualElement').textContent = `${result.mutual.upper.name}${result.mutual.upper.symbol} 上 / ${result.mutual.lower.name}${result.mutual.lower.symbol} 下`;
    document.getElementById('hexChangedName').textContent = result.changed.name;
    document.getElementById('hexChangedElement').textContent = `${result.changed.upper.name}${result.changed.upper.symbol} 上 / ${result.changed.lower.name}${result.changed.lower.symbol} 下`;

    // Gua info
    document.getElementById('guaInfoContent').innerHTML = `
      <div class="analysis-row"><span class="label">本卦</span><span class="value">${result.main.name}</span></div>
      <div class="analysis-row"><span class="label">互卦</span><span class="value">${result.mutual.name}</span></div>
      <div class="analysis-row"><span class="label">變卦</span><span class="value">${result.changed.name}</span></div>
      <div class="analysis-row"><span class="label">動爻</span><span class="value">第 ${result.yaoPos} 爻（${result.isYaoInUpper ? '上卦' : '下卦'}）</span></div>
      <div class="judgement-text">「${result.main.judgement}」— ${result.main.name}</div>
    `;

    // Ti-Yong
    const ty = result.tiyong;
    document.getElementById('tiyongContent').innerHTML = `
      <div class="analysis-row"><span class="label">體卦</span><span class="value">${result.ti.name}${result.ti.symbol}（${result.ti.element}）— ${result.isYaoInUpper ? '下卦不動' : '上卦不動'}</span></div>
      <div class="analysis-row"><span class="label">用卦</span><span class="value">${result.yong.name}${result.yong.symbol}（${result.yong.element}）— ${result.isYaoInUpper ? '上卦含動爻' : '下卦含動爻'}</span></div>
      <div class="analysis-row"><span class="label">體用關係</span><span class="value">${ty.relation} <span class="tag tag-${ty.tag}">${ty.desc}</span></span></div>
      <div class="analysis-row"><span class="label">五行</span><span class="value">${result.ti.element} vs ${result.yong.element}</span></div>
    `;

    setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    generateAI(result);
  }

  // ===== AI =====
  async function generateAI(result) {
    const container = document.getElementById('aiContent');
    const question = document.getElementById('question').value.trim();
    if (!AIClient.isConfigured()) {
      container.innerHTML = '<div class="ai-error">請先設定 Gemini API Key（點擊右下角 ⚙）</div>';
      return;
    }
    container.innerHTML = '<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div><span>AI 正在解讀卦象...</span></div>';

    const prompt = `請根據以下梅花易數卦象進行解讀（繁體中文，400-600字）：

${question ? `【所問之事】${question}\n` : ''}
【本卦】${result.main.name}（${result.main.judgement}）
  上卦：${result.main.upper.name}（${result.main.upper.element}/${result.main.upper.nature}）
  下卦：${result.main.lower.name}（${result.main.lower.element}/${result.main.lower.nature}）

【互卦】${result.mutual.name}（${result.mutual.judgement}）
【變卦】${result.changed.name}（${result.changed.judgement}）
【動爻】第 ${result.yaoPos} 爻

【體用分析】
  體卦：${result.ti.name}（${result.ti.element}）
  用卦：${result.yong.name}（${result.yong.element}）
  關係：${result.tiyong.relation}（${result.tiyong.desc}）

請從以下角度解讀：
1. 本卦所示的當前狀態
2. 互卦所示的內在因素
3. 變卦所示的發展趨勢
4. 體用生剋的吉凶判斷
5. 綜合建議`;

    const systemPrompt = '你是一位精通梅花易數的命理大師。請用繁體中文回覆，語氣專業沉穩，解讀要具體有深度，最後給出行動建議。';

    try {
      const text = await AIClient.chat(prompt, systemPrompt, { temperature: 0.8, maxTokens: 1200 });
      container.innerHTML = `<div class="ai-result">${text}</div>`;
    } catch(e) {
      container.innerHTML = `<div class="ai-error">AI 解讀失敗：${e.message === 'NO_API_KEY' ? '請先設定 API Key' : e.message}</div>`;
    }
  }

  // ===== Share Card =====
  function generateShareCard(result) {
    const { canvas, ctx, w, h } = ShareCard.createCanvas(600, 400);
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#0a0b0d'); grad.addColorStop(1, '#121014');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    ShareCard.drawBorder(ctx, w, h);

    ctx.font = '700 20px "Noto Serif TC", serif';
    ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'center';
    ctx.fillText('梅花易數', w / 2, 48);

    // Main hexagram lines
    const drawMiniHex = (cx, cy, lines, yaoPos) => {
      const lw = 50, lh = 5, gap = 9;
      for (let i = 0; i < 6; i++) {
        const y = cy + (5 - i) * (lh + gap) - 30;
        const isYao = (i + 1) === yaoPos;
        ctx.fillStyle = isYao ? '#c9a84c' : '#e8e4dc';
        if (lines[i] === 1) {
          ctx.fillRect(cx - lw / 2, y, lw, lh);
        } else {
          const sw = (lw - 6) / 2;
          ctx.fillRect(cx - lw / 2, y, sw, lh);
          ctx.fillRect(cx + 3, y, sw, lh);
        }
      }
    };

    drawMiniHex(120, 160, result.main.lines, result.yaoPos);
    drawMiniHex(300, 160, result.mutual.lines, 0);
    drawMiniHex(480, 160, result.changed.lines, 0);

    ctx.font = '400 12px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62'; ctx.textAlign = 'center';
    ctx.fillText('本卦', 120, 100); ctx.fillText('互卦', 300, 100); ctx.fillText('變卦', 480, 100);
    ctx.font = '700 14px "Noto Serif TC", serif';
    ctx.fillStyle = '#e8e4dc';
    ctx.fillText(result.main.name, 120, 240);
    ctx.fillText(result.mutual.name, 300, 240);
    ctx.fillText(result.changed.name, 480, 240);

    // Ti-Yong
    ctx.font = '400 12px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62'; ctx.textAlign = 'center';
    ctx.fillText(`體：${result.ti.name}（${result.ti.element}）　用：${result.yong.name}（${result.yong.element}）　${result.tiyong.relation}`, w / 2, 280);

    // Judgement
    ctx.font = '400 13px "Noto Serif TC", serif';
    ctx.fillStyle = '#dfc06a';
    ctx.fillText(`「${result.main.judgement}」`, w / 2, 320);

    const question = document.getElementById('question').value.trim();
    if (question) {
      ctx.font = '400 11px "Noto Sans TC", sans-serif';
      ctx.fillStyle = '#706b62';
      ctx.fillText(`問：${question.slice(0, 30)}${question.length > 30 ? '...' : ''}`, w / 2, 350);
    }

    ShareCard.drawWatermark(ctx, w, h);
    return canvas;
  }

  // ===== UI Events =====
  // Method tabs
  document.querySelectorAll('.method-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.method-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.method).classList.add('active');
    });
  });

  // Number
  document.getElementById('numBtn').addEventListener('click', () => {
    const n1 = parseInt(document.getElementById('num1').value);
    const n2 = parseInt(document.getElementById('num2').value);
    const n3 = parseInt(document.getElementById('num3').value);
    if (!n1 || !n2 || !n3 || n1 < 1 || n2 < 1 || n3 < 1) {
      alert('請輸入三個正整數');
      return;
    }
    renderResult(numberGua(n1, n2, n3));
  });

  // Time
  function updateLunarTime() {
    try {
      const lunar = Lunar.fromDate(new Date());
      const shiChen = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
      const hour = new Date().getHours();
      const shiIdx = Math.floor((hour + 1) / 2) % 12;
      document.getElementById('lunarTime').textContent = `農曆 ${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()} ${shiChen[shiIdx]}時`;
      document.getElementById('solarTime').textContent = `西曆 ${new Date().toLocaleDateString('zh-TW')} ${new Date().toLocaleTimeString('zh-TW')}`;
    } catch(e) {
      document.getElementById('lunarTime').textContent = '農曆時間載入中...';
    }
  }
  updateLunarTime();
  setInterval(updateLunarTime, 60000);

  document.getElementById('timeBtn').addEventListener('click', () => {
    renderResult(timeGua());
  });

  // Text
  document.getElementById('textBtn').addEventListener('click', () => {
    const text = document.getElementById('textInput').value.trim();
    if (!text) { alert('請輸入文字'); return; }
    const result = textGua(text);
    if (result) renderResult(result);
  });

  // Random
  document.getElementById('randomBtn').addEventListener('click', () => {
    renderResult(randomGua());
  });

  // Retry
  document.getElementById('retryBtn').addEventListener('click', () => {
    document.getElementById('resultSection').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Share
  document.getElementById('shareBtn').addEventListener('click', () => {
    if (!lastResult) return;
    const card = generateShareCard(lastResult);
    const modal = document.getElementById('cardModal');
    ShareCard.preview(card, document.getElementById('cardPreview'));
    modal.classList.add('open');
    modal._card = card;
  });
  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (!lastResult) return;
    ShareCard.download(generateShareCard(lastResult), 'meihua-oracle.png');
  });
  document.getElementById('modalShareBtn').addEventListener('click', () => {
    const modal = document.getElementById('cardModal');
    if (modal._card) ShareCard.share(modal._card, { title: '梅花易數', filename: 'meihua-oracle.png' });
  });
  document.getElementById('modalDownloadBtn').addEventListener('click', () => {
    const modal = document.getElementById('cardModal');
    if (modal._card) ShareCard.download(modal._card, 'meihua-oracle.png');
  });
  document.getElementById('modalCloseBtn').addEventListener('click', () => {
    document.getElementById('cardModal').classList.remove('open');
  });
  document.getElementById('cardModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  // Config
  document.getElementById('configToggle').addEventListener('click', () => {
    const panel = document.getElementById('configPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) AIClient.renderConfigUI(panel);
  });
})();
