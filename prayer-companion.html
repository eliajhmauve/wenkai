<html lang="zh-Hant">
<head>

  <meta name="keywords" content="禱告,祈禱,靈修,基督教,禱告計時器,AI禱告,福青施老師">
  <meta name="author" content="福青施老師">
  <meta name="theme-color" content="#c9a84c">
  <link rel="canonical" href="https://eliajhmauve.github.io/wenkai/prayer-companion.html">
  <meta property="og:title" content="禱告陪伴室 — 福青施老師">
  <meta property="og:description" content="安靜的禱告空間，AI 禱告陪伴與禱告日記">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eliajhmauve.github.io/wenkai/prayer-companion.html">
  <meta property="og:locale" content="zh_TW">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="禱告陪伴室 — 福青施老師">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙏</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060708; --bg-alt: #0a0b0d; --surface: rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.06);
      --border-hover: rgba(212,175,55,0.2); --text: #e8e4dc; --text-dim: #706b62;
      --gold: #c9a84c; --gold-light: #dfc06a; --radius: 12px;
      --font-serif: 'Noto Serif TC', serif; --font-sans: 'Noto Sans TC', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.8; -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(6,7,8,0.9); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .nav-inner { max-width: 900px; margin: 0 auto; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav-back { color: var(--text-dim); text-decoration: none; font-size: 0.85rem; transition: color 0.3s; }
    .nav-back:hover { color: var(--gold); }
    .nav-brand { font-family: var(--font-serif); font-size: 0.95rem; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
    .nav-actions { display: flex; gap: 8px; }
    .nav-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; transition: all 0.3s; font-family: var(--font-sans); }
    .nav-btn:hover { border-color: var(--border-hover); color: var(--text); }

    .hero { padding: 140px 24px 40px; text-align: center; background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%); }
    .hero h1 { font-family: var(--font-serif); font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; letter-spacing: 6px; margin-bottom: 12px; background: linear-gradient(135deg, var(--text) 0%, var(--gold-light) 50%, var(--text) 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { color: var(--text-dim); font-size: 0.92rem; letter-spacing: 2px; }

    .container { max-width: 700px; margin: 0 auto; padding: 0 24px 60px; }

    /* Categories */
    .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 12px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .cat-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .cat-card.active { border-color: var(--gold); background: rgba(201,168,76,0.05); }
    .cat-card .emoji { font-size: 1.8rem; display: block; margin-bottom: 8px; }
    .cat-card .name { font-size: 0.8rem; color: var(--text-dim); }
    .cat-card.active .name { color: var(--gold); }

    /* Prayer Area */
    .prayer-area { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; margin-bottom: 24px; }
    .prayer-area h3 { font-family: var(--font-serif); color: var(--gold); font-size: 1rem; margin-bottom: 8px; letter-spacing: 2px; }
    .prayer-area .guide { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 16px; font-style: italic; line-height: 1.8; }
    .prayer-area textarea { width: 100%; min-height: 120px; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: var(--text); font-size: 0.9rem; font-family: var(--font-sans); resize: vertical; line-height: 1.9; transition: border-color 0.3s; }
    .prayer-area textarea:focus { outline: none; border-color: var(--border-hover); }
    .prayer-area textarea::placeholder { color: var(--text-dim); }
    .prayer-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .prayer-btn { padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-family: var(--font-sans); transition: all 0.3s; }
    .prayer-btn-primary { background: var(--gold); color: var(--bg); border: none; font-weight: 500; }
    .prayer-btn-primary:hover { background: var(--gold-light); }
    .prayer-btn-secondary { background: none; border: 1px solid var(--border); color: var(--text-dim); }
    .prayer-btn-secondary:hover { border-color: var(--border-hover); color: var(--text); }

    /* Timer */
    .timer-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; margin-bottom: 24px; text-align: center; }
    .timer-display { font-family: var(--font-serif); font-size: 3rem; font-weight: 900; color: var(--text); letter-spacing: 4px; margin: 16px 0; }
    .timer-display.running { color: var(--gold); }
    .timer-presets { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
    .timer-preset { padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; cursor: pointer; background: none; border: 1px solid var(--border); color: var(--text-dim); font-family: var(--font-sans); transition: all 0.3s; }
    .timer-preset:hover, .timer-preset.active { border-color: var(--gold); color: var(--gold); }
    .timer-controls { display: flex; gap: 12px; justify-content: center; }
    .timer-ctrl-btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.2rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
    .timer-start { background: var(--gold); color: var(--bg); }
    .timer-start:hover { background: var(--gold-light); }
    .timer-reset { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }

    /* Breathing */
    .breath-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid rgba(201,168,76,0.3); margin: 16px auto; display: none; animation: breathe 8s ease-in-out infinite; }
    .breath-circle.active { display: block; }
    @keyframes breathe { 0%,100% { transform: scale(0.8); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 0.8; } }
    .breath-hint { font-size: 0.78rem; color: var(--text-dim); display: none; }
    .breath-hint.active { display: block; }

    /* AI Section */
    .ai-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
    .ai-section h3 { font-family: var(--font-serif); color: var(--gold); font-size: 1rem; margin-bottom: 12px; letter-spacing: 2px; }
    .ai-loading { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 0.85rem; }
    .ai-loading .dots { display: flex; gap: 4px; }
    .ai-loading .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: dotPulse 1.4s ease-in-out infinite; }
    .ai-loading .dots span:nth-child(2) { animation-delay: 0.2s; }
    .ai-loading .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse { 0%,80%,100% { opacity: 0.3; transform: scale(0.6); } 40% { opacity: 1; transform: scale(1); } }
    .ai-result { font-size: 0.88rem; line-height: 2; white-space: pre-wrap; }
    .ai-error { color: #e57373; font-size: 0.85rem; }

    /* Journal */
    .journal-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
    .journal-section h3 { font-family: var(--font-serif); color: var(--gold); font-size: 1rem; margin-bottom: 12px; letter-spacing: 2px; display: flex; justify-content: space-between; align-items: center; }
    .journal-count { font-size: 0.75rem; color: var(--text-dim); font-family: var(--font-sans); font-weight: 400; }
    .journal-empty { text-align: center; color: var(--text-dim); font-size: 0.85rem; padding: 24px 0; }
    .journal-item { padding: 14px; background: rgba(255,255,255,0.02); border-radius: 8px; margin-bottom: 8px; position: relative; }
    .journal-item-cat { font-size: 0.72rem; color: var(--gold); margin-bottom: 4px; }
    .journal-item-text { font-size: 0.84rem; color: var(--text); line-height: 1.8; white-space: pre-wrap; }
    .journal-item-date { font-size: 0.7rem; color: var(--text-dim); margin-top: 6px; }
    .journal-item-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; opacity: 0.5; transition: opacity 0.2s; }
    .journal-item-del:hover { opacity: 1; color: #e57373; }
    .journal-list { max-height: 400px; overflow-y: auto; }

    /* Share */
    .share-actions { display: flex; gap: 12px; justify-content: center; margin: 24px 0; flex-wrap: wrap; }

    .card-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
    .card-modal.open { display: flex; }
    .card-modal-inner { max-width: 600px; width: 100%; text-align: center; }
    .card-modal-inner canvas { max-width: 100%; height: auto; border-radius: 8px; }
    .card-modal-actions { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }
    .card-modal-actions button { padding: 10px 24px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-family: var(--font-sans); }

    .config-toggle { position: fixed; bottom: 24px; right: 24px; z-index: 80; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; transition: all 0.3s; }
    .config-toggle:hover { border-color: var(--border-hover); }
    .config-panel { position: fixed; bottom: 80px; right: 24px; z-index: 80; width: 320px; display: none; }
    .config-panel.open { display: block; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .footer { text-align: center; padding: 40px 24px; border-top: 1px solid rgba(255,255,255,0.04); }
    .footer-brand { font-family: var(--font-serif); color: var(--gold); font-size: 0.9rem; letter-spacing: 4px; margin-bottom: 8px; }
    .footer-copy { color: var(--text-dim); font-size: 0.75rem; }

    @media (max-width: 480px) {
      .hero h1 { font-size: 1.6rem; }
      .cat-grid { grid-template-columns: repeat(3, 1fr); }
      .timer-display { font-size: 2.4rem; }
      .config-panel { right: 12px; width: calc(100vw - 24px); max-width: 320px; }
    }
  </style>
</head>

<div class="container">

  <div class="cat-grid" id="catGrid">
    <div class="cat-card active" data-cat="thanks"><span class="emoji">🙏</span><span class="name">感恩</span></div>
    <div class="cat-card" data-cat="confess"><span class="emoji">💧</span><span class="name">懺悔</span></div>
    <div class="cat-card" data-cat="intercede"><span class="emoji">🤝</span><span class="name">代禱</span></div>
    <div class="cat-card" data-cat="petition"><span class="emoji">🙌</span><span class="name">祈求</span></div>

  </div>

  <div class="timer-section">
    <h3 style="font-family:var(--font-serif);color:var(--gold);font-size:1rem;letter-spacing:2px;margin-bottom:8px;">靜禱計時器</h3>
    <div class="timer-presets">
      <button class="timer-preset" data-min="3">3 分鐘</button>
      <button class="timer-preset active" data-min="5">5 分鐘</button>
      <button class="timer-preset" data-min="10">10 分鐘</button>
      <button class="timer-preset" data-min="15">15 分鐘</button>
      <button class="timer-preset" data-min="30">30 分鐘</button>
    </div>
    <div class="timer-display" id="timerDisplay">05:00</div>
    <div class="breath-circle" id="breathCircle"></div>
    <p class="breath-hint" id="breathHint">跟著圓圈呼吸... 吸氣 — 吐氣</p>
    <div class="timer-controls">
      <button class="timer-ctrl-btn timer-start" id="timerStart" aria-label="開始">▶</button>
      <button class="timer-ctrl-btn timer-reset" id="timerReset" aria-label="重置">⟳</button>

  </div>

  <div class="ai-section" id="aiSection" style="display:none">
    <h3>AI 禱告引導</h3>

  <div class="journal-section" id="journalSection" style="display:none">
    <h3>禱告日記 <span class="journal-count" id="journalCount"></span></h3>

  </div>

</div>

<div class="card-modal" id="cardModal">
  <div class="card-modal-inner">
    <div id="cardPreview"></div>
    <div class="card-modal-actions">
      <button class="prayer-btn prayer-btn-primary" id="modalShareBtn">分享</button>
      <button class="prayer-btn prayer-btn-secondary" id="modalDownloadBtn">下載</button>
      <button class="prayer-btn prayer-btn-secondary" id="modalCloseBtn">關閉</button>
    </div>
  </div>
</div>

<button class="config-toggle" id="configToggle" aria-label="AI 設定">⚙</button>
<div class="config-panel" id="configPanel"></div>

<footer class="footer">
  <p class="footer-brand">福青施老師</p>
  <p class="footer-copy">&copy; 2026 All rights reserved.</p>
</footer>

<script src="shared/ai-client.js"></script>
<script src="shared/share-card.js"></script>
<script>
(function() {
  'use strict';

  const CATS = {
    thanks: { title: '感恩禱告', guide: '回想今天值得感謝的事物，向神獻上感恩。無論大小，每一份恩典都值得紀念。', prompt: '感恩' },
    confess: { title: '懺悔禱告', guide: '在神面前誠實面對自己的軟弱與過犯。神的恩典大過一切，祂必赦免與更新。', prompt: '懺悔' },
    intercede: { title: '代禱', guide: '為你所愛的人、教會、社會、世界禱告。把他們的需要帶到神面前。', prompt: '代禱' },
    petition: { title: '祈求禱告', guide: '將你的需要、困惑、渴望告訴神。祂垂聽每一個真誠的祈求。', prompt: '祈求' },
    praise: { title: '讚美禱告', guide: '讚美神的偉大、慈愛與信實。從心底發出對造物主的敬拜。', prompt: '讚美' }
  };

  let currentCat = 'thanks';
  const JOURNAL_KEY = 'wenkai_prayer_journal';

  // Categories
  document.getElementById('catGrid').addEventListener('click', (e) => {
    const card = e.target.closest('.cat-card');
    if (!card) return;
    document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    currentCat = card.dataset.cat;
    const cat = CATS[currentCat];
    document.getElementById('prayerTitle').textContent = cat.title;
    document.getElementById('prayerGuide').textContent = cat.guide;
  });

  // Timer
  let timerSeconds = 300, timerInterval = null, timerRunning = false;
  const timerDisplay = document.getElementById('timerDisplay');

  function formatTime(s) {
    return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
  }

  document.querySelectorAll('.timer-preset').forEach(btn => {
    btn.addEventListener('click', () => {
      if (timerRunning) return;
      document.querySelectorAll('.timer-preset').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      timerSeconds = parseInt(btn.dataset.min) * 60;
      timerDisplay.textContent = formatTime(timerSeconds);
    });
  });

  document.getElementById('timerStart').addEventListener('click', () => {
    if (timerRunning) {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timerStart').textContent = '▶';
      timerDisplay.classList.remove('running');
      document.getElementById('breathCircle').classList.remove('active');
      document.getElementById('breathHint').classList.remove('active');
    } else {
      if (timerSeconds <= 0) return;
      timerRunning = true;
      document.getElementById('timerStart').textContent = '⏸';
      timerDisplay.classList.add('running');
      document.getElementById('breathCircle').classList.add('active');
      document.getElementById('breathHint').classList.add('active');
      timerInterval = setInterval(() => {
        timerSeconds--;
        timerDisplay.textContent = formatTime(timerSeconds);
        if (timerSeconds <= 0) {
          clearInterval(timerInterval);
          timerRunning = false;
          document.getElementById('timerStart').textContent = '▶';
          timerDisplay.classList.remove('running');
          document.getElementById('breathCircle').classList.remove('active');
          document.getElementById('breathHint').classList.remove('active');
          timerDisplay.textContent = '阿們 ✝';
        }
      }, 1000);
    }
  });

  document.getElementById('timerReset').addEventListener('click', () => {
    clearInterval(timerInterval);
    timerRunning = false;
    const activePreset = document.querySelector('.timer-preset.active');
    timerSeconds = activePreset ? parseInt(activePreset.dataset.min) * 60 : 300;
    timerDisplay.textContent = formatTime(timerSeconds);
    timerDisplay.classList.remove('running');
    document.getElementById('timerStart').textContent = '▶';
    document.getElementById('breathCircle').classList.remove('active');
    document.getElementById('breathHint').classList.remove('active');
  });

  // Save prayer
  document.getElementById('saveBtn').addEventListener('click', () => {
    const text = document.getElementById('prayerText').value.trim();
    if (!text) return;
    const journal = JSON.parse(localStorage.getItem(JOURNAL_KEY) || '[]');
    journal.unshift({ cat: currentCat, title: CATS[currentCat].title, text, date: new Date().toISOString() });
    if (journal.length > 200) journal.pop();
    localStorage.setItem(JOURNAL_KEY, JSON.stringify(journal));
    document.getElementById('prayerText').value = '';
    renderJournal();
    // Show journal
    document.getElementById('journalSection').style.display = 'block';
    document.getElementById('journalSection').style.animation = 'fadeUp 0.4s ease';
  });

  // Journal
  function renderJournal() {
    const journal = JSON.parse(localStorage.getItem(JOURNAL_KEY) || '[]');
    const container = document.getElementById('journalList');
    document.getElementById('journalCount').textContent = `${journal.length} 篇`;
    if (!journal.length) {
      container.innerHTML = '<div class="journal-empty">尚無禱告記錄</div>';
      return;
    }
    container.innerHTML = journal.map((item, i) => `
      <div class="journal-item">
        <button class="journal-item-del" data-idx="${i}" aria-label="刪除">✕</button>
        <div class="journal-item-cat">${item.title || item.cat}</div>
        <div class="journal-item-text">${item.text}</div>
        <div class="journal-item-date">${new Date(item.date).toLocaleString('zh-TW')}</div>
      </div>
    `).join('');
    container.querySelectorAll('.journal-item-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        journal.splice(idx, 1);
        localStorage.setItem(JOURNAL_KEY, JSON.stringify(journal));
        renderJournal();
      });
    });
  }

  document.getElementById('journalToggle').addEventListener('click', () => {
    const sec = document.getElementById('journalSection');
    if (sec.style.display === 'none') {
      sec.style.display = 'block';
      sec.style.animation = 'fadeUp 0.4s ease';
      renderJournal();
    } else {
      sec.style.display = 'none';
    }
  });

  // AI Prayer
  document.getElementById('aiPrayerBtn').addEventListener('click', async () => {
    const section = document.getElementById('aiSection');
    const container = document.getElementById('aiContent');
    section.style.display = 'block';
    section.style.animation = 'fadeUp 0.4s ease';

    if (!AIClient.isConfigured()) {
      container.innerHTML = '<div class="ai-error">請先設定 Gemini API Key（點擊右下角 ⚙）</div>';
      return;
    }

    const userText = document.getElementById('prayerText').value.trim();
    container.innerHTML = '<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div><span>AI 正在為你預備禱告引導...</span></div>';

    const cat = CATS[currentCat];
    const prompt = `請為我寫一段${cat.title}的禱告引導文（繁體中文，200-350字）。
${userText ? `用戶想禱告的內容：${userText}` : ''}

禱告類型：${cat.prompt}
要求：
1. 以「親愛的天父」或類似稱呼開頭
2. 語氣溫暖、真誠、親密
3. 引用 1-2 節相關經文（含書卷章節）
4. 以「奉主耶穌基督的名禱告，阿們」結尾`;

    const systemPrompt = '你是一位溫暖的基督教禱告陪伴者。請用繁體中文撰寫禱告文，語氣親密虔誠，不要說教，要像和神說話一樣自然。';

    try {
      const text = await AIClient.chat(prompt, systemPrompt, { temperature: 0.85, maxTokens: 800 });
      container.innerHTML = `<div class="ai-result">${text}</div>`;
    } catch(e) {
      container.innerHTML = `<div class="ai-error">AI 引導失敗：${e.message === 'NO_API_KEY' ? '請先設定 API Key' : e.message}</div>`;
    }

    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // Share Card
  document.getElementById('shareCardBtn').addEventListener('click', () => {
    const text = document.getElementById('prayerText').value.trim();
    if (!text) { alert('請先寫下禱告內容'); return; }
    const card = generateCard(text);
    const modal = document.getElementById('cardModal');
    ShareCard.preview(card, document.getElementById('cardPreview'));
    modal.classList.add('open');
    modal._card = card;
  });

  function generateCard(text) {
    const { canvas, ctx, w, h } = ShareCard.createCanvas(600, 400);
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#0a0b0d'); grad.addColorStop(1, '#0e0d12');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    ShareCard.drawBorder(ctx, w, h);

    ctx.font = '400 14px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'center';
    ctx.fillText(CATS[currentCat].title, w / 2, 48);

    ctx.font = '60px serif';
    ctx.fillStyle = 'rgba(201,168,76,0.1)';
    ctx.fillText('✝', w / 2, 95);

    ctx.font = '400 16px "Noto Serif TC", serif';
    ctx.fillStyle = '#e8e4dc'; ctx.textAlign = 'center';
    ShareCard.wrapText(ctx, text.slice(0, 150) + (text.length > 150 ? '...' : ''), w / 2, 130, w - 100, 30);

    const now = new Date();
    ctx.font = '400 11px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62';
    ctx.fillText(now.toLocaleDateString('zh-TW'), w / 2, h - 50);

    ShareCard.drawWatermark(ctx, w, h);
    return canvas;
  }

  // Modal
  document.getElementById('modalShareBtn').addEventListener('click', () => {
    const modal = document.getElementById('cardModal');
    if (modal._card) ShareCard.share(modal._card, { title: '禱告卡', filename: 'prayer-card.png' });
  });
  document.getElementById('modalDownloadBtn').addEventListener('click', () => {
    const modal = document.getElementById('cardModal');
    if (modal._card) ShareCard.download(modal._card, 'prayer-card.png');
  });
  document.getElementById('modalCloseBtn').addEventListener('click', () => document.getElementById('cardModal').classList.remove('open'));
  document.getElementById('cardModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

  // Config
  document.getElementById('configToggle').addEventListener('click', () => {
    const panel = document.getElementById('configPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) AIClient.renderConfigUI(panel);
  });
})();
</script>
</body>
</html>
