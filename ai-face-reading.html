<script>
(function() {
  'use strict';

  const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
  let modelsLoaded = false;
  let currentImage = null;
  let lastAnalysis = null;

  // ===== Load face-api.js on demand =====
  function loadFaceApiScript() {
    return new Promise((resolve, reject) => {
      if (window.faceapi) { resolve(); return; }
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js';
      s.onload = resolve;
      s.onerror = () => reject(new Error('face-api.js 載入失敗'));
      document.head.appendChild(s);
    });
  }

  async function loadModels() {
    if (modelsLoaded) return;
    await loadFaceApiScript();
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
    ]);
    modelsLoaded = true;
  }

  // ===== Image Processing =====
  function processImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          // Resize if needed
          const maxSize = 1200;
          let w = img.width, h = img.height;
          if (w > maxSize || h > maxSize) {
            const ratio = Math.min(maxSize / w, maxSize / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          const processedImg = new Image();
          processedImg.onload = () => resolve(processedImg);
          processedImg.src = canvas.toDataURL('image/jpeg', 0.9);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ===== Face Analysis =====
  async function analyzeFace(img) {
    const detection = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.3 }))
      .withFaceLandmarks();

    if (!detection) throw new Error('未偵測到人臉，請上傳清晰的正面照片');

    const landmarks = detection.landmarks;
    const positions = landmarks.positions;

    // Key points
    const jawOutline = landmarks.getJawOutline(); // 0-16
    const leftEyeBrow = landmarks.getLeftEyeBrow(); // 17-21
    const rightEyeBrow = landmarks.getRightEyeBrow(); // 22-26
    const nose = landmarks.getNose(); // 27-35
    const leftEye = landmarks.getLeftEye(); // 36-41
    const rightEye = landmarks.getRightEye(); // 42-47
    const mouth = landmarks.getMouth(); // 48-67

    // Three sections (三停)
    const browTop = Math.min(...leftEyeBrow.map(p => p.y), ...rightEyeBrow.map(p => p.y));
    const faceTop = browTop - (jawOutline[8].y - browTop) * 0.35; // Estimate forehead top
    const noseBottom = nose[6].y; // Nose tip
    const chinBottom = jawOutline[8].y;

    const upperH = browTop - faceTop;
    const middleH = noseBottom - browTop;
    const lowerH = chinBottom - noseBottom;
    const totalH = upperH + middleH + lowerH;

    const upperRatio = upperH / totalH;
    const middleRatio = middleH / totalH;
    const lowerRatio = lowerH / totalH;

    // Score based on deviation from 1/3
    const ideal = 1 / 3;
    const upperScore = Math.round(100 - Math.abs(upperRatio - ideal) * 300);
    const middleScore = Math.round(100 - Math.abs(middleRatio - ideal) * 300);
    const lowerScore = Math.round(100 - Math.abs(lowerRatio - ideal) * 300);

    // Five features
    // Eyebrow: arc height vs baseline
    const browMidL = leftEyeBrow[2]; // highest point
    const browBaseL = { x: (leftEyeBrow[0].x + leftEyeBrow[4].x) / 2, y: (leftEyeBrow[0].y + leftEyeBrow[4].y) / 2 };
    const browArc = browBaseL.y - browMidL.y;
    const browType = browArc > 6 ? '弧眉（感性細膩）' : browArc < 2 ? '平眉（理性冷靜）' : '挑眉（積極進取）';

    // Eye: width vs height ratio
    const eyeW = Math.abs(leftEye[3].x - leftEye[0].x);
    const eyeH = Math.abs(((leftEye[1].y + leftEye[2].y) / 2) - ((leftEye[4].y + leftEye[5].y) / 2));
    const eyeRatio = eyeW / Math.max(eyeH, 1);
    const eyeType = eyeRatio > 4 ? '細長眼（精明睿智）' : eyeRatio < 2.5 ? '圓眼（親和力強）' : '杏眼（穩重大方）';

    // Nose: width vs length
    const noseW = Math.abs(nose[8].x - nose[4].x); // nostrils width
    const noseL = Math.abs(nose[6].y - nose[0].y);
    const noseRatio = noseW / Math.max(noseL, 1);
    const noseType = noseRatio > 0.85 ? '寬鼻（財運厚實）' : noseRatio < 0.55 ? '小巧鼻（精緻敏銳）' : '挺鼻（事業心強）';

    // Mouth: width vs face width
    const mouthW = Math.abs(mouth[6].x - mouth[0].x);
    const faceW = Math.abs(jawOutline[16].x - jawOutline[0].x);
    const mouthRatio = mouthW / Math.max(faceW, 1);
    const mouthType = mouthRatio > 0.45 ? '大嘴（豪爽大方）' : mouthRatio < 0.35 ? '小嘴（溫柔婉約）' : '標準嘴（表達得體）';

    // Face shape
    const faceHW = totalH / Math.max(faceW, 1);
    const faceShape = faceHW > 1.5 ? '長臉（思考型）' : faceHW < 1.2 ? '圓臉（親和型）' : '瓜子臉（平衡型）';

    return {
      landmarks: positions,
      detection: detection.detection,
      santing: {
        faceTop, browTop, noseBottom, chinBottom,
        upperH, middleH, lowerH, totalH,
        upperRatio, middleRatio, lowerRatio,
        upperScore: Math.max(40, Math.min(100, upperScore)),
        middleScore: Math.max(40, Math.min(100, middleScore)),
        lowerScore: Math.max(40, Math.min(100, lowerScore))
      },
      features: { browType, eyeType, noseType, mouthType, faceShape },
      keyPoints: { faceTop, browTop, noseBottom, chinBottom, leftEyeBrow, rightEyeBrow, nose, leftEye, rightEye, mouth, jawOutline }
    };
  }

  // ===== Canvas Annotation =====
  function drawAnnotation(img, analysis) {
    const canvas = document.getElementById('annotatedCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    const maxW = Math.min(img.width, 600);
    const scale = maxW / img.width;
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);

    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);

    // Draw image
    ctx.drawImage(img, 0, 0, w, h);

    const s = analysis.santing;
    const sx = scale;

    // Three section lines
    ctx.setLineDash([6, 4]);
    ctx.lineWidth = 1.5;
    const lines = [
      { y: s.faceTop * sx, label: '上停起點', color: 'rgba(201,168,76,0.6)' },
      { y: s.browTop * sx, label: '眉 — 上/中停界', color: 'rgba(201,168,76,0.8)' },
      { y: s.noseBottom * sx, label: '鼻尖 — 中/下停界', color: 'rgba(201,168,76,0.8)' },
      { y: s.chinBottom * sx, label: '下巴', color: 'rgba(201,168,76,0.6)' }
    ];

    lines.forEach(line => {
      ctx.beginPath();
      ctx.moveTo(w * 0.15, line.y);
      ctx.lineTo(w * 0.85, line.y);
      ctx.strokeStyle = line.color;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = '11px "Noto Sans TC", sans-serif';
      ctx.fillStyle = 'rgba(201,168,76,0.9)';
      ctx.textAlign = 'left';
      ctx.fillText(line.label, w * 0.15, line.y - 5);
      ctx.setLineDash([6, 4]);
    });

    ctx.setLineDash([]);

    // Section labels on right
    const sections = [
      { y: (s.faceTop + s.browTop) / 2 * sx, label: '上停', sub: '少年運' },
      { y: (s.browTop + s.noseBottom) / 2 * sx, label: '中停', sub: '中年運' },
      { y: (s.noseBottom + s.chinBottom) / 2 * sx, label: '下停', sub: '晚年運' }
    ];
    sections.forEach(sec => {
      ctx.font = '700 13px "Noto Sans TC", sans-serif';
      ctx.fillStyle = '#c9a84c';
      ctx.textAlign = 'right';
      ctx.fillText(sec.label, w * 0.95, sec.y - 2);
      ctx.font = '400 10px "Noto Sans TC", sans-serif';
      ctx.fillStyle = 'rgba(201,168,76,0.7)';
      ctx.fillText(sec.sub, w * 0.95, sec.y + 12);
    });

    // Key landmark dots
    const kp = analysis.keyPoints;
    const drawDot = (p, color = 'rgba(201,168,76,0.7)') => {
      ctx.beginPath();
      ctx.arc(p.x * sx, p.y * sx, 3, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    };
    kp.leftEye.forEach(p => drawDot(p));
    kp.rightEye.forEach(p => drawDot(p));
    kp.nose.forEach(p => drawDot(p, 'rgba(201,168,76,0.5)'));
    kp.mouth.slice(0, 12).forEach(p => drawDot(p, 'rgba(201,168,76,0.4)'));
  }

  // ===== Render Results =====
  function renderResults(analysis) {
    const s = analysis.santing;

    // Santing grid
    const santingData = [
      { label: '少年運（15-30歲）', name: '上停', score: s.upperScore, ratio: (s.upperRatio * 100).toFixed(1),
        desc: s.upperRatio > 0.36 ? '額頭寬廣，早年運勢佳' : s.upperRatio < 0.3 ? '額頭較窄，需靠後天努力' : '比例均衡，穩步發展' },
      { label: '中年運（31-50歲）', name: '中停', score: s.middleScore, ratio: (s.middleRatio * 100).toFixed(1),
        desc: s.middleRatio > 0.36 ? '鼻樑挺拔，中年事業亨通' : s.middleRatio < 0.3 ? '中庭偏短，宜多積累' : '比例適中，運勢穩定' },
      { label: '晚年運（51歲+）', name: '下停', score: s.lowerScore, ratio: (s.lowerRatio * 100).toFixed(1),
        desc: s.lowerRatio > 0.36 ? '下巴飽滿，晚年福壽' : s.lowerRatio < 0.3 ? '下庭略短，宜注重養生' : '比例平衡，安享晚年' }
    ];

    document.getElementById('santingGrid').innerHTML = santingData.map(d => `
      <div class="santing-item">
        <div class="santing-label">${d.label}</div>
        <div class="santing-name">${d.name}</div>
        <div class="santing-score">${d.score}<span style="font-size:0.7rem;color:var(--text-dim)">分</span></div>
        <div class="santing-desc">${d.desc}</div>
        <div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">佔比 ${d.ratio}%</div>
      </div>
    `).join('');

    // Ratio bar
    document.getElementById('ratioBar').innerHTML = `
      <div class="ratio-upper" style="width:${s.upperRatio * 100}%"></div>
      <div class="ratio-middle" style="width:${s.middleRatio * 100}%"></div>
      <div class="ratio-lower" style="width:${s.lowerRatio * 100}%"></div>
    `;
    document.getElementById('ratioLabels').innerHTML = `
      <span>上停 ${(s.upperRatio * 100).toFixed(1)}%</span>
      <span>中停 ${(s.middleRatio * 100).toFixed(1)}%</span>
      <span>下停 ${(s.lowerRatio * 100).toFixed(1)}%</span>
    `;

    // Features
    const f = analysis.features;
    document.getElementById('featureGrid').innerHTML = `
      <div class="feature-item"><div class="feature-label">眉形</div><div class="feature-value">${f.browType}</div></div>
      <div class="feature-item"><div class="feature-label">眼型</div><div class="feature-value">${f.eyeType}</div></div>
      <div class="feature-item"><div class="feature-label">鼻形</div><div class="feature-value">${f.noseType}</div></div>
      <div class="feature-item"><div class="feature-label">嘴形</div><div class="feature-value">${f.mouthType}</div></div>
      <div class="feature-item"><div class="feature-label">臉型</div><div class="feature-value">${f.faceShape}</div></div>
      <div class="feature-item"><div class="feature-label">三停總評</div><div class="feature-value">${
        Math.abs(s.upperRatio - s.middleRatio) < 0.05 && Math.abs(s.middleRatio - s.lowerRatio) < 0.05
          ? '三停均衡（上佳面相）' : '略有偏差（各有特色）'
      }</div></div>
    `;
  }

  // ===== AI Analysis =====
  async function generateAI(analysis) {
    const container = document.getElementById('aiContent');
    if (!AIClient.isConfigured()) {
      container.innerHTML = '<div class="ai-error">請先設定 Gemini API Key（點擊右下角 ⚙）</div>';
      return;
    }
    container.innerHTML = '<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div><span>AI 正在解讀面相...</span></div>';

    const s = analysis.santing;
    const f = analysis.features;
    const prompt = `請根據以下面相分析數據，撰寫一份面相命理報告（繁體中文，400-600字）：

【三停分析】
- 上停（額頭→眉）：佔比 ${(s.upperRatio * 100).toFixed(1)}%，評分 ${s.upperScore}分
- 中停（眉→鼻尖）：佔比 ${(s.middleRatio * 100).toFixed(1)}%，評分 ${s.middleScore}分
- 下停（鼻尖→下巴）：佔比 ${(s.lowerRatio * 100).toFixed(1)}%，評分 ${s.lowerScore}分

【五官分析】
- 眉形：${f.browType}
- 眼型：${f.eyeType}
- 鼻形：${f.noseType}
- 嘴形：${f.mouthType}
- 臉型：${f.faceShape}

請從三停運勢（少年/中年/晚年）、五官特質、整體格局三個面向解讀，語氣溫暖正面，最後給出開運建議。`;

    const systemPrompt = '你是一位資深面相學大師，精通三停五官面相命理。請用繁體中文回覆，語氣專業溫暖，避免負面用語。';

    try {
      const text = await AIClient.chat(prompt, systemPrompt, { temperature: 0.8, maxTokens: 1200 });
      container.innerHTML = `<div class="ai-result">${text}</div>`;
    } catch(e) {
      container.innerHTML = `<div class="ai-error">AI 解讀失敗：${e.message === 'NO_API_KEY' ? '請先設定 API Key' : e.message}</div>`;
    }
  }

  // ===== Share Card =====
  function generateShareCard(analysis) {
    const s = analysis.santing;
    const f = analysis.features;
    const { canvas, ctx, w, h } = ShareCard.createCanvas(600, 450);
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#0a0b0d'); grad.addColorStop(1, '#121014');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    ShareCard.drawBorder(ctx, w, h);

    ctx.font = '700 20px "Noto Serif TC", serif';
    ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'center';
    ctx.fillText('面相分析報告', w / 2, 50);

    // Santing scores
    const items = [
      { label: '上停（少年運）', score: s.upperScore, ratio: s.upperRatio },
      { label: '中停（中年運）', score: s.middleScore, ratio: s.middleRatio },
      { label: '下停（晚年運）', score: s.lowerScore, ratio: s.lowerRatio }
    ];
    items.forEach((item, i) => {
      const y = 100 + i * 50;
      ctx.font = '400 13px "Noto Sans TC", sans-serif';
      ctx.fillStyle = '#706b62'; ctx.textAlign = 'left';
      ctx.fillText(item.label, 50, y);
      ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'right';
      ctx.fillText(`${item.score}分 (${(item.ratio * 100).toFixed(1)}%)`, w - 50, y);
      ShareCard.roundRect(ctx, 50, y + 8, w - 100, 5, 2.5);
      ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
      const fw = (item.score / 100) * (w - 100);
      ShareCard.roundRect(ctx, 50, y + 8, fw, 5, 2.5);
      ctx.fillStyle = '#c9a84c'; ctx.fill();
    });

    // Features
    const features = [f.browType, f.eyeType, f.noseType, f.mouthType, f.faceShape];
    const featureLabels = ['眉形', '眼型', '鼻形', '嘴形', '臉型'];
    ctx.font = '700 14px "Noto Serif TC", serif';
    ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'center';
    ctx.fillText('五官特徵', w / 2, 290);

    features.forEach((feat, i) => {
      const y = 316 + i * 22;
      ctx.font = '400 12px "Noto Sans TC", sans-serif';
      ctx.fillStyle = '#706b62'; ctx.textAlign = 'left';
      ctx.fillText(featureLabels[i], 80, y);
      ctx.fillStyle = '#e8e4dc'; ctx.textAlign = 'right';
      ctx.fillText(feat, w - 80, y);
    });

    ShareCard.drawWatermark(ctx, w, h);
    return canvas;
  }

  // ===== UI Events =====
  const uploadArea = document.getElementById('uploadArea');
  const cameraInput = document.getElementById('cameraInput');
  const galleryInput = document.getElementById('galleryInput');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg = document.getElementById('previewImg');
  const loadingSection = document.getElementById('loadingSection');
  const resultSection = document.getElementById('resultSection');

  document.getElementById('cameraBtn').addEventListener('click', () => cameraInput.click());
  document.getElementById('galleryBtn').addEventListener('click', () => galleryInput.click());

  async function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    currentImage = await processImage(file);
    previewImg.src = currentImage.src;
    uploadArea.style.display = 'none';
    previewWrap.classList.add('visible');
    resultSection.classList.remove('visible');
  }

  cameraInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  galleryInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  // Drag & drop
  uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault(); uploadArea.classList.remove('dragover');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  document.getElementById('reuploadBtn').addEventListener('click', () => {
    previewWrap.classList.remove('visible');
    uploadArea.style.display = '';
    resultSection.classList.remove('visible');
    currentImage = null;
  });

  document.getElementById('analyzeBtn').addEventListener('click', async () => {
    if (!currentImage) return;
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    previewWrap.classList.remove('visible');
    loadingSection.classList.add('visible');

    try {
      document.getElementById('loadingText').textContent = '正在載入 AI 模型...';
      await loadModels();
      document.getElementById('loadingText').textContent = '正在分析面部特徵...';
      const analysis = await analyzeFace(currentImage);
      lastAnalysis = analysis;

      loadingSection.classList.remove('visible');
      resultSection.classList.add('visible');

      drawAnnotation(currentImage, analysis);
      renderResults(analysis);
      generateAI(analysis);

      setTimeout(() => resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    } catch(e) {
      loadingSection.classList.remove('visible');
      previewWrap.classList.add('visible');
      alert(e.message || '分析失敗，請重試');
    }
    btn.disabled = false;
  });

  document.getElementById('retryBtn').addEventListener('click', () => {
    resultSection.classList.remove('visible');
    uploadArea.style.display = '';
    currentImage = null;
  });

  document.getElementById('shareBtn').addEventListener('click', () => {
    if (!lastAnalysis) return;
    const card = generateShareCard(lastAnalysis);
    const modal = document.getElementById('cardModal');
    ShareCard.preview(card, document.getElementById('cardPreview'));
    modal.classList.add('open');
    modal._card = card;
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (!lastAnalysis) return;
    ShareCard.download(generateShareCard(lastAnalysis), 'face-reading.png');
  });

  document.getElementById('modalShareBtn').addEventListener('click', () => {
    const modal = document.getElementById('cardModal');
    if (modal._card) ShareCard.share(modal._card, { title: '面相分析報告', filename: 'face-reading.png' });
  });
  document.getElementById('modalDownloadBtn').addEventListener('click', () => {
    const modal = document.getElementById('cardModal');
    if (modal._card) ShareCard.download(modal._card, 'face-reading.png');
  });
  document.getElementById('modalCloseBtn').addEventListener('click', () => {
    document.getElementById('cardModal').classList.remove('open');
  });
  document.getElementById('cardModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  // Config
  document.getElementById('configToggle').addEventListener('click', () => {
    const panel = document.getElementById('configPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) AIClient.renderConfigUI(panel);
  });
})();
</script>
