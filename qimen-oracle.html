    body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.8; -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh; }

    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(6,7,8,0.9); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.04); }

    .share-actions { display: flex; gap: 12px; justify-content: center; margin: 24px 0; flex-wrap: wrap; }

    .share-btn-secondary { background: none; border: 1px solid var(--border); color: var(--text-dim); }

    .card-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
    .card-modal.open { display: flex; }
    .card-modal-inner { max-width: 600px; width: 100%; text-align: center; }
    .card-modal-inner canvas { max-width: 100%; height: auto; border-radius: 8px; }
    .card-modal-actions { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }
    .card-modal-actions button { padding: 10px 24px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-family: var(--font-sans); }

    .config-toggle { position: fixed; bottom: 24px; right: 24px; z-index: 80; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.1rem; transition: all 0.3s; }
    .config-toggle:hover { border-color: var(--border-hover); }
    .config-panel { position: fixed; bottom: 80px; right: 24px; z-index: 80; width: 320px; display: none; }
    .config-panel.open { display: block; }

    .footer { text-align: center; padding: 40px 24px; border-top: 1px solid rgba(255,255,255,0.04); }

    @media (max-width: 480px) {

      .config-panel { right: 12px; width: calc(100vw - 24px); max-width: 320px; }
    }
  </style>
</head>

<script>
(function() {
  'use strict';

  // ===== 奇門遁甲基礎資料 =====
  const JIUXING = ['天蓬','天芮','天沖','天輔','天禽','天心','天柱','天任','天英'];
  const JIUXING_ELEMENT = ['水','土','木','木','土','金','金','土','火'];
  const JIUXING_LUCK = ['凶','凶','吉','吉','中','吉','凶','吉','吉'];

  const BAMEN = ['休門','死門','傷門','杜門','—','開門','驚門','生門','景門'];
  const BAMEN_LUCK = ['吉','凶','凶','中','—','吉','凶','吉','中'];

  const BASHEN = ['值符','騰蛇','太陰','六合','—','白虎','玄武','九地','九天'];

  const BAGUA_NAMES = ['坎','坤','震','巽','中','乾','兌','艮','離'];
  const BAGUA_SYMBOLS = ['☵','☷','☳','☴','','☰','☱','☶','☲'];
  const BAGUA_ELEMENTS = ['水','土','木','木','土','金','金','土','火'];

  // 九宮位序（洛書序：4 9 2 / 3 5 7 / 8 1 6）→ 陣列 index
  // 顯示順序：巽(4)離(9)坤(2) / 震(3)中(5)兌(7) / 艮(8)坎(1)乾(6)
  const LOSHU = [3, 8, 1, 2, 4, 6, 7, 0, 5]; // grid position → palace index (0-based)
  const DIR_NAMES = ['東南','南','西南','東','中宮','西','東北','北','西北'];

  // ===== 簡化排盤（基於時辰的偽隨機分佈） =====
  function generatePan() {
    const now = new Date();
    const lunar = Lunar.fromDate(now);
    const hour = now.getHours();
    const shiIdx = Math.floor((hour + 1) / 2) % 12;
    const dayGanZhi = lunar.getDayInGanZhi();
    const monthGanZhi = lunar.getMonthInGanZhi();
    const yearGanZhi = lunar.getYearInGanZhi();

    // 用時辰+日干支生成種子
    const seed = (shiIdx * 7 + dayGanZhi.charCodeAt(0) * 3 + now.getMinutes()) % 9;

    // 九星排列（從種子位開始順排）
    const starOrder = [];
    for (let i = 0; i < 9; i++) starOrder.push((seed + i) % 9);

    // 八門排列（偏移不同）
    const doorSeed = (seed + 3 + shiIdx) % 9;
    const doorOrder = [];
    for (let i = 0; i < 9; i++) doorOrder.push((doorSeed + i) % 9);

    // 八神排列
    const godSeed = (seed + 5 + Math.floor(hour / 3)) % 9;
    const godOrder = [];
    for (let i = 0; i < 9; i++) godOrder.push((godSeed + i) % 9);

    // 遁甲類型
    const dunType = seed < 5 ? '陽遁' : '陰遁';
    const ju = (seed % 9) + 1;

    // 組合九宮
    const palaces = [];
    for (let i = 0; i < 9; i++) {
      palaces.push({
        dir: DIR_NAMES[i],
        gua: BAGUA_NAMES[LOSHU[i]],
        guaSymbol: BAGUA_SYMBOLS[LOSHU[i]],
        guaElement: BAGUA_ELEMENTS[LOSHU[i]],
        star: JIUXING[starOrder[i]],
        starElement: JIUXING_ELEMENT[starOrder[i]],
        starLuck: JIUXING_LUCK[starOrder[i]],
        door: BAMEN[doorOrder[i]],
        doorLuck: BAMEN_LUCK[doorOrder[i]],
        god: BASHEN[godOrder[i]]
      });
    }

    // 找值使門和值符星
    const zhifuPalace = palaces.findIndex(p => p.god === '值符');
    const zhishiDoor = palaces[zhifuPalace]?.door || '休門';

    return {
      palaces,
      dunType,
      ju,
      lunarInfo: {
        year: yearGanZhi,
        month: monthGanZhi,
        day: dayGanZhi,
        shi: lunar.getTimeInGanZhi(),
        lunarDate: `${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()}`
      },
      zhifuPalace,
      zhishiDoor,
      solarTime: now.toLocaleString('zh-TW')
    };
  }

  // ===== Render =====
  let lastPan = null;

  function renderPan(pan) {
    lastPan = pan;
    const grid = document.getElementById('palaceGrid');
    grid.innerHTML = pan.palaces.map((p, i) => `
      <div class="palace-cell${i === pan.zhifuPalace ? ' active-palace' : ''}">
        <div class="palace-dir">${p.dir}（${p.gua}）</div>
        <div class="palace-gua">${p.guaSymbol}</div>
        <div class="palace-star">${p.star}</div>
        <div class="palace-door">${p.door}</div>
        <div class="palace-god">${p.god}</div>
        <div class="palace-element">${p.guaElement}</div>
      </div>
    `).join('');

    // Pan info
    document.getElementById('panInfo').innerHTML = `
      <div class="analysis-row"><span class="label">遁甲類型</span><span class="value">${pan.dunType}${pan.ju}局</span></div>
      <div class="analysis-row"><span class="label">農曆</span><span class="value">${pan.lunarInfo.lunarDate}</span></div>
      <div class="analysis-row"><span class="label">日干支</span><span class="value">${pan.lunarInfo.day}</span></div>
      <div class="analysis-row"><span class="label">時干支</span><span class="value">${pan.lunarInfo.shi}</span></div>
      <div class="analysis-row"><span class="label">值符</span><span class="value">${pan.palaces[pan.zhifuPalace]?.star || '-'}（${pan.palaces[pan.zhifuPalace]?.dir || '-'}宮）</span></div>
      <div class="analysis-row"><span class="label">值使門</span><span class="value">${pan.zhishiDoor}</span></div>
    `;

    // Yongshen
    const goodPalaces = pan.palaces.filter(p => p.starLuck === '吉' && p.doorLuck === '吉');
    const badPalaces = pan.palaces.filter(p => p.starLuck === '凶' && p.doorLuck === '凶');
    document.getElementById('yongshenInfo').innerHTML = `
      <div class="analysis-row"><span class="label">吉方位</span><span class="value">${goodPalaces.map(p => p.dir).join('、') || '無明顯吉方'}<span class="tag tag-good">宜</span></span></div>
      <div class="analysis-row"><span class="label">凶方位</span><span class="value">${badPalaces.map(p => p.dir).join('、') || '無明顯凶方'}<span class="tag tag-bad">忌</span></span></div>
      <div class="analysis-row"><span class="label">格局</span><span class="value">${pan.palaces[pan.zhifuPalace]?.starLuck === '吉' ? '值符落吉宮，整體利好' : '值符受制，宜守不宜進'}</span></div>
    `;

    document.getElementById('resultSection').classList.add('visible');
    setTimeout(() => document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  // ===== AI =====
  async function generateAI(pan) {
    const container = document.getElementById('aiContent');
    const question = document.getElementById('question').value.trim();
    if (!AIClient.isConfigured()) {
      container.innerHTML = '<div class="ai-error">請先設定 Gemini API Key（點擊右下角 ⚙）</div>';
      return;
    }
    container.innerHTML = '<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div><span>AI 正在解讀奇門盤...</span></div>';

    const palaceDesc = pan.palaces.map(p => `${p.dir}宮（${p.gua}${p.guaSymbol}/${p.guaElement}）：${p.star}(${p.starElement}) + ${p.door} + ${p.god}`).join('\n');

    const prompt = `請根據以下奇門遁甲盤面進行決策解讀（繁體中文，400-600字）：

${question ? `【問事】${question}\n` : ''}
【基本資訊】
- ${pan.dunType}${pan.ju}局
- 農曆：${pan.lunarInfo.lunarDate}
- 日干支：${pan.lunarInfo.day}，時干支：${pan.lunarInfo.shi}
- 值符：${pan.palaces[pan.zhifuPalace]?.star}（${pan.palaces[pan.zhifuPalace]?.dir}宮）
- 值使門：${pan.zhishiDoor}

【九宮盤面】
${palaceDesc}

請從以下角度解讀：
1. 值符值使的整體判斷
2. 吉門吉星所在方位的建議
3. 需要注意的凶方凶門
4. ${question ? '針對所問之事的具體建議' : '整體運勢建議'}
5. 行動方向與時機`;

    const systemPrompt = '你是一位精通奇門遁甲的命理大師。請用繁體中文回覆，語氣專業沉穩，解讀要具體實用，最後給出明確的行動建議。';

    try {
      const text = await AIClient.chat(prompt, systemPrompt, { temperature: 0.8, maxTokens: 1200 });
      container.innerHTML = `<div class="ai-result">${text}</div>`;
    } catch(e) {
      container.innerHTML = `<div class="ai-error">AI 解讀失敗：${e.message === 'NO_API_KEY' ? '請先設定 API Key' : e.message}</div>`;
    }
  }

  // ===== Share Card =====
  function generateShareCard(pan) {
    const { canvas, ctx, w, h } = ShareCard.createCanvas(600, 440);
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#0a0b0d'); grad.addColorStop(1, '#121014');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    ShareCard.drawBorder(ctx, w, h);

    ctx.font = '700 20px "Noto Serif TC", serif';
    ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'center';
    ctx.fillText('奇門遁甲決策盤', w / 2, 48);

    ctx.font = '400 11px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62';
    ctx.fillText(`${pan.dunType}${pan.ju}局 | ${pan.lunarInfo.lunarDate} | ${pan.lunarInfo.shi}`, w / 2, 70);

    // Mini 九宮
    const cellW = 120, cellH = 70, startX = (w - cellW * 3 - 16) / 2, startY = 90, gap = 8;
    pan.palaces.forEach((p, i) => {
      const col = i % 3, row = Math.floor(i / 3);
      const x = startX + col * (cellW + gap), y = startY + row * (cellH + gap);
      ctx.fillStyle = i === pan.zhifuPalace ? 'rgba(201,168,76,0.08)' : 'rgba(255,255,255,0.03)';
      ctx.fillRect(x, y, cellW, cellH);
      ctx.strokeStyle = i === pan.zhifuPalace ? 'rgba(201,168,76,0.4)' : 'rgba(255,255,255,0.06)';
      ctx.strokeRect(x, y, cellW, cellH);

      ctx.font = '400 9px "Noto Sans TC", sans-serif';
      ctx.fillStyle = '#706b62'; ctx.textAlign = 'center';
      ctx.fillText(`${p.dir}（${p.gua}）`, x + cellW / 2, y + 14);
      ctx.font = '500 11px "Noto Sans TC", sans-serif';
      ctx.fillStyle = '#c9a84c';
      ctx.fillText(p.star, x + cellW / 2, y + 32);
      ctx.fillStyle = '#81c784';
      ctx.fillText(p.door, x + cellW / 2, y + 48);
      ctx.fillStyle = '#90caf9';
      ctx.fillText(p.god, x + cellW / 2, y + 64);
    });

    // Bottom info
    const goodP = pan.palaces.filter(p => p.starLuck === '吉' && p.doorLuck === '吉');
    ctx.font = '400 12px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62'; ctx.textAlign = 'center';
    ctx.fillText(`吉方：${goodP.map(p => p.dir).join('、') || '—'}`, w / 2, h - 55);
    ctx.fillText(`值符：${pan.palaces[pan.zhifuPalace]?.star}  值使：${pan.zhishiDoor}`, w / 2, h - 35);

    ShareCard.drawWatermark(ctx, w, h);
    return canvas;
  }

  // ===== Events =====
  function updateTime() {
    try {
      const lunar = Lunar.fromDate(new Date());
      document.getElementById('lunarTime').textContent = `${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()} ${lunar.getTimeInGanZhi()}時`;
      document.getElementById('solarTime').textContent = new Date().toLocaleString('zh-TW');
    } catch(e) { document.getElementById('lunarTime').textContent = '時間載入中...'; }
  }
  updateTime();
  setInterval(updateTime, 60000);

  document.getElementById('genBtn').addEventListener('click', () => {
    const pan = generatePan();
    renderPan(pan);
    generateAI(pan);
  });

  document.getElementById('retryBtn').addEventListener('click', () => {
    document.getElementById('resultSection').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('shareBtn').addEventListener('click', () => {
    if (!lastPan) return;
    const card = generateShareCard(lastPan);
    const modal = document.getElementById('cardModal');
    ShareCard.preview(card, document.getElementById('cardPreview'));
    modal.classList.add('open');
    modal._card = card;
  });
  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (!lastPan) return;
    ShareCard.download(generateShareCard(lastPan), 'qimen-oracle.png');
  });
  document.getElementById('modalShareBtn').addEventListener('click', () => { const m = document.getElementById('cardModal'); if (m._card) ShareCard.share(m._card, { title: '奇門遁甲', filename: 'qimen-oracle.png' }); });
  document.getElementById('modalDownloadBtn').addEventListener('click', () => { const m = document.getElementById('cardModal'); if (m._card) ShareCard.download(m._card, 'qimen-oracle.png'); });
  document.getElementById('modalCloseBtn').addEventListener('click', () => document.getElementById('cardModal').classList.remove('open'));
  document.getElementById('cardModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

  document.getElementById('configToggle').addEventListener('click', () => {
    const p = document.getElementById('configPanel');
    p.classList.toggle('open');
    if (p.classList.contains('open')) AIClient.renderConfigUI(p);
  });
})();
</script>
</body>
