<script>
(function() {
  'use strict';

  // ===== 命理資料 =====
  const TIANGAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const DIZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const GAN_WUXING = { '甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水' };
  const ZHI_WUXING = { '子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水' };

  const LIUHE = [['子','丑'],['寅','亥'],['卯','戌'],['辰','酉'],['巳','申'],['午','未']];
  const SANHE = [['申','子','辰'],['亥','卯','未'],['寅','午','戌'],['巳','酉','丑']];
  const XIANGCHONG = [['子','午'],['丑','未'],['寅','申'],['卯','酉'],['辰','戌'],['巳','亥']];
  const XIANGXING = [['子','卯'],['丑','戌','未'],['寅','巳','申'],['辰','辰'],['午','午'],['酉','酉'],['亥','亥']];

  const SHENG_PAIRS = [['木','火'],['火','土'],['土','金'],['金','水'],['水','木']];
  const KE_PAIRS = [['木','土'],['土','水'],['水','火'],['火','金'],['金','木']];

  // 星座資料
  const ZODIAC_NAMES = ['牡羊座','金牛座','雙子座','巨蟹座','獅子座','處女座','天秤座','天蠍座','射手座','摩羯座','水瓶座','雙魚座'];
  const ZODIAC_ELEMENTS = ['火','土','風','水','火','土','風','水','火','土','風','水'];
  const ZODIAC_DATES = [[3,21],[4,20],[5,21],[6,21],[7,23],[8,23],[9,23],[10,23],[11,22],[12,22],[1,20],[2,19]];

  // 星座相容矩陣 12x12（0=牡羊 ... 11=雙魚）
  const ZODIAC_COMPAT = [
    [75,60,88,55,95,58,82,65,92,55,85,68],
    [60,78,55,90,58,95,62,88,55,92,58,85],
    [88,55,76,62,85,68,92,55,82,58,95,60],
    [55,90,62,80,58,85,55,95,60,88,65,92],
    [95,58,85,58,78,55,90,62,95,55,82,58],
    [58,95,68,85,55,80,58,90,55,92,62,85],
    [82,62,92,55,90,58,76,60,88,55,92,65],
    [65,88,55,95,62,90,60,82,58,85,55,95],
    [92,55,82,60,95,55,88,58,78,62,90,55],
    [55,92,58,88,55,92,55,85,62,80,58,90],
    [85,58,95,65,82,62,92,55,90,58,78,60],
    [68,85,60,92,58,85,65,95,55,90,60,82]
  ];

  // ===== 工具函數 =====
  function getZodiacIndex(month, day) {
    const dates = [[1,20],[2,19],[3,21],[4,20],[5,21],[6,21],[7,23],[8,23],[9,23],[10,23],[11,22],[12,22]];
    // 摩羯座跨年特殊處理
    if ((month === 12 && day >= 22) || (month === 1 && day <= 19)) return 9;
    if (month === 1 && day >= 20 && day <= 31) return 10;
    if (month === 2 && day <= 18) return 10;
    if (month === 2 && day >= 19) return 11;
    for (let i = 2; i < 12; i++) {
      const [sm, sd] = dates[i];
      const [em, ed] = dates[i + 1] || [1, 20];
      if (month === sm && day >= sd) return i;
      if (i < 11 && month === sm + 1 && day < dates[i + 1][1]) return i;
    }
    // fallback by month ranges
    const zodiacRanges = [
      [3,21,4,19,0],[4,20,5,20,1],[5,21,6,20,2],[6,21,7,22,3],
      [7,23,8,22,4],[8,23,9,22,5],[9,23,10,22,6],[10,23,11,21,7],
      [11,22,12,21,8],[12,22,1,19,9],[1,20,2,18,10],[2,19,3,20,11]
    ];
    for (const [sm,sd,em,ed,idx] of zodiacRanges) {
      if ((month === sm && day >= sd) || (month === em && day <= ed)) return idx;
    }
    return 0;
  }

  function calcLifeNumber(dateStr) {
    const digits = dateStr.replace(/-/g, '').split('').map(Number);
    let sum = digits.reduce((a, b) => a + b, 0);
    // 大師數字 11, 22, 33
    if (sum === 11 || sum === 22 || sum === 33) return sum;
    while (sum > 9) {
      sum = String(sum).split('').map(Number).reduce((a, b) => a + b, 0);
      if (sum === 11 || sum === 22 || sum === 33) return sum;
    }
    return sum;
  }

  const LIFE_NUM_NAMES = {
    1: '領袖', 2: '合作', 3: '創意', 4: '穩定', 5: '自由',
    6: '關懷', 7: '探索', 8: '權力', 9: '博愛',
    11: '直覺大師', 22: '建築大師', 33: '療癒大師'
  };

  const LIFE_NUM_COMPAT = {
    '1-1':70,'1-2':80,'1-3':90,'1-4':60,'1-5':85,'1-6':65,'1-7':75,'1-8':80,'1-9':85,
    '2-2':75,'2-3':70,'2-4':85,'2-5':60,'2-6':90,'2-7':65,'2-8':80,'2-9':75,
    '3-3':80,'3-4':55,'3-5':90,'3-6':85,'3-7':70,'3-8':65,'3-9':88,
    '4-4':70,'4-5':55,'4-6':85,'4-7':75,'4-8':90,'4-9':60,
    '5-5':75,'5-6':60,'5-7':85,'5-8':70,'5-9':90,
    '6-6':80,'6-7':55,'6-8':65,'6-9':90,
    '7-7':78,'7-8':60,'7-9':75,
    '8-8':72,'8-9':65,
    '9-9':80
  };

  function getLifeNumCompat(n1, n2) {
    const a = Math.min(n1, n2), b = Math.max(n1, n2);
    // 大師數字降為個位比較
    const a2 = a > 9 ? (a === 11 ? 2 : a === 22 ? 4 : 6) : a;
    const b2 = b > 9 ? (b === 11 ? 2 : b === 22 ? 4 : 6) : b;
    const key = `${Math.min(a2,b2)}-${Math.max(a2,b2)}`;
    return (LIFE_NUM_COMPAT[key] || 70) + (a > 9 || b > 9 ? 5 : 0);
  }

  function checkRelation(zhi1, zhi2) {
    const results = [];
    for (const pair of LIUHE) {
      if (pair.includes(zhi1) && pair.includes(zhi2) && zhi1 !== zhi2) results.push('六合');
    }
    for (const trio of SANHE) {
      if (trio.includes(zhi1) && trio.includes(zhi2) && zhi1 !== zhi2) results.push('三合');
    }
    for (const pair of XIANGCHONG) {
      if (pair.includes(zhi1) && pair.includes(zhi2) && zhi1 !== zhi2) results.push('相沖');
    }
    for (const group of XIANGXING) {
      if (group.length === 2 && group.includes(zhi1) && group.includes(zhi2) && zhi1 !== zhi2) results.push('相刑');
      if (group.length === 3 && group.includes(zhi1) && group.includes(zhi2) && zhi1 !== zhi2) results.push('相刑');
      if (group.length === 1 && zhi1 === group[0] && zhi2 === group[0]) results.push('自刑');
    }
    return results.length ? results : ['無特殊關係'];
  }

  function wuxingRelation(wx1, wx2) {
    if (wx1 === wx2) return '比和';
    for (const [a, b] of SHENG_PAIRS) {
      if (a === wx1 && b === wx2) return '我生';
      if (a === wx2 && b === wx1) return '生我';
    }
    for (const [a, b] of KE_PAIRS) {
      if (a === wx1 && b === wx2) return '我剋';
      if (a === wx2 && b === wx1) return '剋我';
    }
    return '無';
  }

  // ===== 分析邏輯 =====
  function analyze(date1, date2, name1, name2) {
    const d1 = new Date(date1), d2 = new Date(date2);

    // 八字分析 (lunar-javascript)
    let bazi = { score: 70, details: {} };
    try {
      const lunar1 = Lunar.fromDate(d1);
      const lunar2 = Lunar.fromDate(d2);
      const ec1 = lunar1.getEightChar();
      const ec2 = lunar2.getEightChar();

      const dayGan1 = ec1.getDayGan(), dayZhi1 = ec1.getDayZhi();
      const dayGan2 = ec2.getDayGan(), dayZhi2 = ec2.getDayZhi();

      const relations = checkRelation(dayZhi1, dayZhi2);
      const ganWx1 = GAN_WUXING[dayGan1], ganWx2 = GAN_WUXING[dayGan2];
      const zhiWx1 = ZHI_WUXING[dayZhi1], zhiWx2 = ZHI_WUXING[dayZhi2];
      const ganRelation = wuxingRelation(ganWx1, ganWx2);
      const zhiRelation = wuxingRelation(zhiWx1, zhiWx2);

      let score = 65;
      if (relations.includes('六合')) score += 25;
      if (relations.includes('三合')) score += 18;
      if (relations.includes('相沖')) score -= 20;
      if (relations.includes('相刑')) score -= 12;
      if (ganRelation === '比和' || ganRelation === '生我' || ganRelation === '我生') score += 8;
      if (ganRelation === '剋我' || ganRelation === '我剋') score -= 5;
      score = Math.max(30, Math.min(100, score));

      bazi = {
        score,
        dayPillar1: dayGan1 + dayZhi1,
        dayPillar2: dayGan2 + dayZhi2,
        relations,
        ganWx1, ganWx2, zhiWx1, zhiWx2,
        ganRelation, zhiRelation,
        eightChar1: `${ec1.getYearGan()}${ec1.getYearZhi()} ${ec1.getMonthGan()}${ec1.getMonthZhi()} ${dayGan1}${dayZhi1} ${ec1.getTimeGan()}${ec1.getTimeZhi()}`,
        eightChar2: `${ec2.getYearGan()}${ec2.getYearZhi()} ${ec2.getMonthGan()}${ec2.getMonthZhi()} ${dayGan2}${dayZhi2} ${ec2.getTimeGan()}${ec2.getTimeZhi()}`
      };
    } catch(e) {
      bazi.error = '八字計算失敗';
    }

    // 星座分析
    const z1 = getZodiacIndex(d1.getMonth() + 1, d1.getDate());
    const z2 = getZodiacIndex(d2.getMonth() + 1, d2.getDate());
    const zodiacScore = ZODIAC_COMPAT[z1][z2];
    const zodiac = {
      score: zodiacScore,
      name1: ZODIAC_NAMES[z1],
      name2: ZODIAC_NAMES[z2],
      element1: ZODIAC_ELEMENTS[z1],
      element2: ZODIAC_ELEMENTS[z2],
      elementRelation: ZODIAC_ELEMENTS[z1] === ZODIAC_ELEMENTS[z2] ? '同元素（默契極高）' :
        (['火','風'].includes(ZODIAC_ELEMENTS[z1]) && ['火','風'].includes(ZODIAC_ELEMENTS[z2])) ? '陽性元素互補' :
        (['土','水'].includes(ZODIAC_ELEMENTS[z1]) && ['土','水'].includes(ZODIAC_ELEMENTS[z2])) ? '陰性元素互補' : '元素互異（需磨合）'
    };

    // 生命靈數
    const ln1 = calcLifeNumber(date1);
    const ln2 = calcLifeNumber(date2);
    const lnScore = getLifeNumCompat(ln1, ln2);
    const numerology = {
      score: Math.min(100, lnScore),
      num1: ln1, num2: ln2,
      name1: LIFE_NUM_NAMES[ln1] || ln1,
      name2: LIFE_NUM_NAMES[ln2] || ln2
    };

    // 總分
    const totalScore = Math.round(bazi.score * 0.4 + zodiac.score * 0.35 + numerology.score * 0.25);

    // 五維度
    const dims = {
      love: Math.round(zodiac.score * 0.6 + bazi.score * 0.4),
      career: Math.round(bazi.score * 0.5 + numerology.score * 0.5),
      communication: Math.round(zodiac.score * 0.5 + numerology.score * 0.5),
      values: Math.round(bazi.score * 0.4 + zodiac.score * 0.3 + numerology.score * 0.3),
      spiritual: Math.round(numerology.score * 0.5 + bazi.score * 0.3 + zodiac.score * 0.2)
    };

    return { totalScore, bazi, zodiac, numerology, dims, name1, name2 };
  }

  // ===== Canvas: Score Ring =====
  function drawScoreRing(score) {
    const canvas = document.getElementById('scoreRing');
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = 200 * dpr; canvas.height = 200 * dpr;
    canvas.style.width = '200px'; canvas.style.height = '200px';
    ctx.scale(dpr, dpr);

    const cx = 100, cy = 100, r = 80, lw = 10;
    // Background ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = lw;
    ctx.stroke();

    // Animated fill
    let current = 0;
    function draw() {
      ctx.clearRect(0, 0, 200, 200);
      // bg ring
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = lw; ctx.stroke();
      // fill ring
      const angle = (current / 100) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, angle);
      const grad = ctx.createLinearGradient(0, 0, 200, 200);
      grad.addColorStop(0, '#c9a84c'); grad.addColorStop(1, '#dfc06a');
      ctx.strokeStyle = grad; ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
      // text
      ctx.font = '900 36px "Noto Serif TC", serif';
      ctx.fillStyle = '#e8e4dc'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(Math.round(current), cx, cy - 6);
      ctx.font = '400 13px "Noto Sans TC", sans-serif';
      ctx.fillStyle = '#706b62';
      ctx.fillText('相容指數', cx, cy + 22);

      if (current < score) {
        current += Math.max(1, (score - current) * 0.08);
        if (current > score) current = score;
        requestAnimationFrame(draw);
      }
    }
    draw();
  }

  // ===== Canvas: Radar Chart =====
  function drawRadarChart(dims) {
    const canvas = document.getElementById('radarChart');
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const size = 360;
    canvas.width = size * dpr; canvas.height = size * dpr;
    canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
    ctx.scale(dpr, dpr);

    const cx = size / 2, cy = size / 2, maxR = 130;
    const labels = ['感情', '事業', '溝通', '價值觀', '靈性'];
    const values = [dims.love, dims.career, dims.communication, dims.values, dims.spiritual];
    const n = 5;

    // Grid
    for (let level = 1; level <= 4; level++) {
      const r = (level / 4) * maxR;
      ctx.beginPath();
      for (let i = 0; i <= n; i++) {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Axes
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + maxR * Math.cos(angle), cy + maxR * Math.sin(angle));
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

    // Data polygon
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const idx = i % n;
      const angle = (Math.PI * 2 * idx / n) - Math.PI / 2;
      const r = (values[idx] / 100) * maxR;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.fillStyle = 'rgba(201,168,76,0.15)';
    ctx.fill();
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Data points
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const r = (values[i] / 100) * maxR;
      ctx.beginPath();
      ctx.arc(cx + r * Math.cos(angle), cy + r * Math.sin(angle), 4, 0, Math.PI * 2);
      ctx.fillStyle = '#dfc06a';
      ctx.fill();
    }

    // Labels
    ctx.font = '400 13px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#e8e4dc';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const lr = maxR + 24;
      const x = cx + lr * Math.cos(angle);
      const y = cy + lr * Math.sin(angle);
      ctx.fillText(`${labels[i]} ${values[i]}`, x, y);
    }
  }

  // ===== Render Results =====
  function renderResults(result) {
    const section = document.getElementById('resultSection');
    section.classList.add('visible');

    // Score ring
    drawScoreRing(result.totalScore);
    const level = result.totalScore >= 85 ? '天作之合' : result.totalScore >= 70 ? '相當契合' : result.totalScore >= 55 ? '互有磨合' : '需多包容';
    document.getElementById('scoreLabel').textContent = `${result.name1} × ${result.name2}｜${level}`;

    // Bazi
    const b = result.bazi;
    const tagClass = b.score >= 80 ? 'tag-good' : b.score >= 60 ? 'tag-neutral' : 'tag-bad';
    document.getElementById('baziContent').innerHTML = `
      <div class="analysis-row"><span class="label">${result.name1} 日柱</span><span class="value">${b.dayPillar1 || '-'}</span></div>
      <div class="analysis-row"><span class="label">${result.name2} 日柱</span><span class="value">${b.dayPillar2 || '-'}</span></div>
      <div class="analysis-row"><span class="label">地支關係</span><span class="value">${b.relations ? b.relations.join('、') : '-'} <span class="tag ${tagClass}">${b.score}分</span></span></div>
      <div class="analysis-row"><span class="label">天干五行</span><span class="value">${b.ganWx1 || '-'} vs ${b.ganWx2 || '-'}（${b.ganRelation || '-'}）</span></div>
      <div class="analysis-row"><span class="label">地支五行</span><span class="value">${b.zhiWx1 || '-'} vs ${b.zhiWx2 || '-'}（${b.zhiRelation || '-'}）</span></div>
      ${b.error ? `<div class="analysis-detail">${b.error}</div>` : ''}
    `;

    // Zodiac
    const z = result.zodiac;
    const zTagClass = z.score >= 80 ? 'tag-good' : z.score >= 60 ? 'tag-neutral' : 'tag-bad';
    document.getElementById('zodiacContent').innerHTML = `
      <div class="analysis-row"><span class="label">${result.name1}</span><span class="value">${z.name1}（${z.element1}象）</span></div>
      <div class="analysis-row"><span class="label">${result.name2}</span><span class="value">${z.name2}（${z.element2}象）</span></div>
      <div class="analysis-row"><span class="label">元素關係</span><span class="value">${z.elementRelation}</span></div>
      <div class="analysis-row"><span class="label">相容分數</span><span class="value"><span class="tag ${zTagClass}">${z.score}分</span></span></div>
    `;

    // Numerology
    const nl = result.numerology;
    const nTagClass = nl.score >= 80 ? 'tag-good' : nl.score >= 60 ? 'tag-neutral' : 'tag-bad';
    document.getElementById('numerologyContent').innerHTML = `
      <div class="analysis-row"><span class="label">${result.name1} 生命靈數</span><span class="value">${nl.num1}（${nl.name1}）</span></div>
      <div class="analysis-row"><span class="label">${result.name2} 生命靈數</span><span class="value">${nl.num2}（${nl.name2}）</span></div>
      <div class="analysis-row"><span class="label">靈數相容度</span><span class="value"><span class="tag ${nTagClass}">${nl.score}分</span></span></div>
    `;

    // Radar
    drawRadarChart(result.dims);

    // Scroll to results
    setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

    // AI
    generateAI(result);
  }

  // ===== AI =====
  async function generateAI(result) {
    const container = document.getElementById('aiContent');
    if (!AIClient.isConfigured()) {
      container.innerHTML = '<div class="ai-error">請先設定 Gemini API Key（點擊右下角 ⚙）</div>';
      return;
    }
    container.innerHTML = '<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div><span>AI 正在深度分析中...</span></div>';

    const prompt = `請為以下兩人的命理相容性做深度解讀報告（繁體中文，300-500字）：

【${result.name1}】
- 八字日柱：${result.bazi.dayPillar1 || '未知'}
- 星座：${result.zodiac.name1}（${result.zodiac.element1}象）
- 生命靈數：${result.numerology.num1}（${result.numerology.name1}）

【${result.name2}】
- 八字日柱：${result.bazi.dayPillar2 || '未知'}
- 星座：${result.zodiac.name2}（${result.zodiac.element2}象）
- 生命靈數：${result.numerology.num2}（${result.numerology.name2}）

【分析數據】
- 八字合婚：${result.bazi.score}分，地支${result.bazi.relations?.join('、')}，天干${result.bazi.ganRelation}
- 星座相容：${result.zodiac.score}分，${result.zodiac.elementRelation}
- 生命靈數：${result.numerology.score}分

- 五維度：感情${result.dims.love}、事業${result.dims.career}、溝通${result.dims.communication}、價值觀${result.dims.values}、靈性${result.dims.spiritual}

請用溫暖正面的語氣，從感情、事業、溝通三個面向解讀，最後給出相處建議。`;

    const systemPrompt = '你是一位資深命理師，擅長八字、星座、生命靈數的整合分析。請用繁體中文回覆，語氣溫暖專業。';

    try {
      const text = await AIClient.chat(prompt, systemPrompt, { temperature: 0.8, maxTokens: 1024 });
      container.innerHTML = `<div class="ai-result">${text}</div>`;
    } catch(e) {
      container.innerHTML = `<div class="ai-error">AI 分析失敗：${e.message === 'NO_API_KEY' ? '請先設定 API Key' : e.message}</div>`;

  // ===== Share Card =====
  let lastResult = null;

  function generateShareCard(result) {
    const { canvas, ctx, w, h } = ShareCard.createCanvas(600, 420);
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#0a0b0d'); grad.addColorStop(1, '#121014');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    ShareCard.drawBorder(ctx, w, h);

    // Title
    ctx.font = '700 20px "Noto Serif TC", serif';
    ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'center';
    ctx.fillText('命理相容性報告', w / 2, 50);

    // Left person
    ctx.font = '700 16px "Noto Serif TC", serif';
    ctx.fillStyle = '#e8e4dc'; ctx.textAlign = 'center';
    ctx.fillText(result.name1, 150, 100);
    ctx.font = '400 12px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62';
    ctx.fillText(`${result.zodiac.name1} | 靈數 ${result.numerology.num1}`, 150, 122);

    // Right person
    ctx.font = '700 16px "Noto Serif TC", serif';
    ctx.fillStyle = '#e8e4dc';
    ctx.fillText(result.name2, 450, 100);
    ctx.font = '400 12px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62';
    ctx.fillText(`${result.zodiac.name2} | 靈數 ${result.numerology.num2}`, 450, 122);

    // Center score
    ctx.font = '900 48px "Noto Serif TC", serif';
    ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'center';
    ctx.fillText(result.totalScore, w / 2, 115);
    ctx.font = '400 12px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62';
    ctx.fillText('相容指數', w / 2, 135);

    // Heart
    ctx.font = '28px serif';
    ctx.fillText('♥', w / 2, 168);

    // Score bars
    const items = [
      { label: '八字合婚', score: result.bazi.score },
      { label: '星座相容', score: result.zodiac.score },
      { label: '生命靈數', score: result.numerology.score }
    ];
    items.forEach((item, i) => {
      const y = 200 + i * 40;
      ctx.font = '400 13px "Noto Sans TC", sans-serif';
      ctx.fillStyle = '#706b62'; ctx.textAlign = 'left';
      ctx.fillText(item.label, 60, y);
      ctx.fillStyle = '#c9a84c'; ctx.textAlign = 'right';
      ctx.fillText(`${item.score}分`, w - 60, y);
      // bar bg
      ShareCard.roundRect(ctx, 160, y + 6, 260, 6, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
      // bar fill
      const fw = (item.score / 100) * 260;
      if (fw > 0) {
        ShareCard.roundRect(ctx, 160, y + 6, fw, 6, 3);
        ctx.fillStyle = '#c9a84c'; ctx.fill();
      }
    });

    // Dims
    const dimLabels = ['感情','事業','溝通','價值觀','靈性'];
    const dimValues = [result.dims.love, result.dims.career, result.dims.communication, result.dims.values, result.dims.spiritual];
    ctx.font = '400 11px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#706b62'; ctx.textAlign = 'center';
    const dimY = 340;
    dimLabels.forEach((label, i) => {
      const x = 80 + i * 110;
      ctx.fillText(`${label} ${dimValues[i]}`, x, dimY);
    });

    ShareCard.drawWatermark(ctx, w, h);
    return canvas;
  }

  // ===== Event Handlers =====
  document.getElementById('analyzeBtn').addEventListener('click', () => {
    const name1 = document.getElementById('name1').value.trim() || '甲方';
    const name2 = document.getElementById('name2').value.trim() || '乙方';
    const bd1 = document.getElementById('birthday1').value;
    const bd2 = document.getElementById('birthday2').value;

    if (!bd1 || !bd2) {
      alert('請輸入雙方的出生日期');
      return;
    }

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true; btn.textContent = '分析中...';

    setTimeout(() => {
      lastResult = analyze(bd1, bd2, name1, name2);
      renderResults(lastResult);
      btn.disabled = false; btn.textContent = '開始分析';
    }, 300);
  });

  document.getElementById('retryBtn').addEventListener('click', () => {
    document.getElementById('resultSection').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('shareBtn').addEventListener('click', () => {
    if (!lastResult) return;
    const card = generateShareCard(lastResult);
    const modal = document.getElementById('cardModal');
    ShareCard.preview(card, document.getElementById('cardPreview'));
    modal.classList.add('open');
    modal._card = card;
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (!lastResult) return;
    const card = generateShareCard(lastResult);
    ShareCard.download(card, 'destiny-compatibility.png');
  });

  document.getElementById('modalShareBtn').addEventListener('click', () => {
    const modal = document.getElementById('cardModal');
    if (modal._card) ShareCard.share(modal._card, { title: '命理相容性報告', filename: 'destiny-compatibility.png' });
  });

  document.getElementById('modalDownloadBtn').addEventListener('click', () => {
    const modal = document.getElementById('cardModal');
    if (modal._card) ShareCard.download(modal._card, 'destiny-compatibility.png');
  });

  document.getElementById('modalCloseBtn').addEventListener('click', () => {
    document.getElementById('cardModal').classList.remove('open');
  });

  document.getElementById('cardModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  // Config
  const configToggle = document.getElementById('configToggle');
  const configPanel = document.getElementById('configPanel');
  configToggle.addEventListener('click', () => {
    configPanel.classList.toggle('open');
    if (configPanel.classList.contains('open')) {
      AIClient.renderConfigUI(configPanel);
    }
  });
})();
