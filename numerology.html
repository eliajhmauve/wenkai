/* ===== Init ===== */
document.addEventListener('DOMContentLoaded', async () => {
  generateStars();
  initDateSelectors();
  await loadData();
  parseURLParams();
});

function generateStars() {
  const container = document.getElementById('stars');
  const count = 80;
  let html = '';
  for (let i = 0; i < count; i++) {
    const size = Math.random() * 2 + 1;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const dur = (Math.random() * 3 + 2).toFixed(1);
    const o1 = (Math.random() * 0.2).toFixed(2);
    const o2 = (Math.random() * 0.5 + 0.3).toFixed(2);
    html += `<span style="width:${size}px;height:${size}px;left:${x}%;top:${y}%;--d:${dur}s;--o1:${o1};--o2:${o2}"></span>`;
  }
  container.innerHTML = html;
}

function initDateSelectors() {
  const yearSel = document.getElementById('sel-year');
  const monthSel = document.getElementById('sel-month');
  const daySel = document.getElementById('sel-day');
  const now = new Date();
  const curYear = now.getFullYear();

  // Year
  yearSel.innerHTML = `<option value="" disabled selected>${T[LANG].selectYear}</option>`;
  for (let y = curYear; y >= 1920; y--) yearSel.innerHTML += `<option value="${y}">${y}</option>`;

  // Month
  monthSel.innerHTML = `<option value="" disabled selected>${T[LANG].selectMonth}</option>`;
  for (let m = 1; m <= 12; m++) monthSel.innerHTML += `<option value="${m}">${m}</option>`;

  // Day
  updateDays();
  yearSel.addEventListener('change', updateDays);
  monthSel.addEventListener('change', updateDays);
}

function updateDays() {
  const y = +document.getElementById('sel-year').value || 2000;
  const m = +document.getElementById('sel-month').value || 1;
  const maxDay = new Date(y, m, 0).getDate();
  const daySel = document.getElementById('sel-day');
  const curVal = +daySel.value;
  daySel.innerHTML = `<option value="" disabled selected>${T[LANG].selectDay}</option>`;
  for (let d = 1; d <= maxDay; d++) daySel.innerHTML += `<option value="${d}" ${d === curVal ? 'selected' : ''}>${d}</option>`;
}

async function loadData() {
  try {
    const res = await fetch('data/numerology.json');
    DATA = await res.json();
  } catch (e) {
    console.error('Failed to load numerology data:', e);
  }
}

function parseURLParams() {
  const p = new URLSearchParams(location.search);
  const y = p.get('y'), m = p.get('m'), d = p.get('d');
  if (y && m && d) {
    document.getElementById('sel-year').value = y;
    document.getElementById('sel-month').value = m;
    updateDays();
    document.getElementById('sel-day').value = d;
    setTimeout(() => calculate(), 300);
  }
}

/* ===== Calculation ===== */
function reduceDigits(n) {
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
    n = String(n).split('').reduce((s, d) => s + +d, 0);
  }
  return n;
}

function sumDigits(n) {
  return String(n).split('').reduce((s, d) => s + +d, 0);
}

function reductionSteps(n) {
  const steps = [n];
  while (n > 9 && n !== 11 && n !== 22 && n !== 33) {
    n = sumDigits(n);
    steps.push(n);
  }
  return steps;
}

function calculate() {
  const y = +document.getElementById('sel-year').value;
  const m = +document.getElementById('sel-month').value;
  const d = +document.getElementById('sel-day').value;
  if (!y || !m || !d) return;

  const t = T[LANG];
  const yearSum = sumDigits(y);
  const yearReduced = reduceDigits(yearSum);
  const monthReduced = reduceDigits(m);
  const dayReduced = reduceDigits(d);
  const total = yearReduced + monthReduced + dayReduced;
  const finalNum = reduceDigits(total);

  // Build animation steps
  const steps = [];
  const isMaster = (n) => [11, 22, 33].includes(n);
  const badge = (n) => isMaster(n) ? `<span class="master-badge">${t.masterKeep}</span>` : '';

  // Year step
  const yDigits = String(y).split('').join(' + ');
  let yearStr = `${t.yearLabel}：${yDigits} = ${yearSum}`;
  if (yearSum !== yearReduced) {
    const ySteps = reductionSteps(yearSum);
    yearStr += ' → ' + ySteps.slice(1).join(' → ');
  }
  yearStr += badge(yearReduced);
  steps.push(yearStr);

  // Month step
  if (m > 9) {
    const mDigits = String(m).split('').join(' + ');
    steps.push(`${t.monthLabel}：${mDigits} = ${monthReduced}${badge(monthReduced)}`);
  } else {
    steps.push(`${t.monthLabel}：${m}${badge(monthReduced)}`);
  }

  // Day step
  if (d > 9) {
    const dDigits = String(d).split('').join(' + ');
    let dayStr = `${t.dayLabel}：${dDigits} = ${sumDigits(d)}`;
    if (sumDigits(d) !== dayReduced) {
      const dSteps = reductionSteps(sumDigits(d));
      dayStr += ' → ' + dSteps.slice(1).join(' → ');
    }
    dayStr += badge(dayReduced);
    steps.push(dayStr);
  } else {
    steps.push(`${t.dayLabel}：${d}`);
  }

  // Sum step
  let sumStr = `${t.sum}：${yearReduced} + ${monthReduced} + ${dayReduced} = ${total}`;
  if (total !== finalNum) {
    const tSteps = reductionSteps(total);
    sumStr += ' → ' + tSteps.slice(1).join(' → ');
  }
  sumStr += badge(finalNum);
  steps.push(sumStr);

  showCalcAnimation(steps, finalNum);
}

function showCalcAnimation(steps, finalNum) {
  const t = T[LANG];
  const container = document.getElementById('calc-steps');
  const anim = document.getElementById('calc-anim');
  anim.classList.add('visible');

  // Build HTML
  let html = '';
  steps.forEach((s, i) => html += `<div class="calc-step" id="step-${i}">${s}</div>`);
  html += `<div class="calc-result-line" id="step-result"><span class="highlight">${t.resultIs} ${finalNum}</span></div>`;
  container.innerHTML = html;

  // Scroll to animation
  anim.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Animate steps one by one
  steps.forEach((_, i) => {
    setTimeout(() => document.getElementById(`step-${i}`).classList.add('show'), 200 + i * 400);
  });
  setTimeout(() => {
    document.getElementById('step-result').classList.add('show');
    // Show result after animation
    setTimeout(() => showResult(finalNum), 600);
  }, 200 + steps.length * 400);
}

  renderNumberHero(data);

  // Update URL
  const y = document.getElementById('sel-year').value;
  const m = document.getElementById('sel-month').value;
  const d = document.getElementById('sel-day').value;
  const url = new URL(location.href);
  url.searchParams.set('y', y);
  url.searchParams.set('m', m);
  url.searchParams.set('d', d);
  history.replaceState(null, '', url);

  // Update button
  const btn = document.getElementById('calc-btn');
  btn.setAttribute('data-i18n', 'recalc');
  btn.textContent = T[LANG].recalc;
}

/* ===== Share Card ===== */
function createShareCanvas() {
  if (!currentResult) return null;
  const data = currentResult;
  const t = T[LANG];
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const W = 600, H = 800;
  const canvas = document.createElement('canvas');
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0A0A1A');
  bg.addColorStop(0.5, '#15082A');
  bg.addColorStop(1, '#1A0A2E');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 60; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const r = Math.random() * 1.2;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.3 + 0.1})`;
    ctx.fill();
  }

  // Gold border
  ctx.strokeStyle = 'rgba(212,168,67,0.2)';
  ctx.lineWidth = 1;
  roundRect(ctx, 20, 20, W - 40, H - 40, 16);
  ctx.stroke();

  // Corner decorations
  const cL = 28;
  ctx.strokeStyle = '#D4A843';
  ctx.lineWidth = 1.5;
  [[20, 20, 1, 1], [W-20, 20, -1, 1], [20, H-20, 1, -1], [W-20, H-20, -1, -1]].forEach(([x, y, dx, dy]) => {
    ctx.beginPath();
    ctx.moveTo(x, y + cL * dy);
    ctx.lineTo(x, y);
    ctx.lineTo(x + cL * dx, y);
    ctx.stroke();
  });

  // Badge
  ctx.font = '400 13px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(212,168,67,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('NUMEROLOGY', W / 2, 66);

  // Large number
  ctx.font = '900 96px "Noto Serif TC", serif';
  const numGrad = ctx.createLinearGradient(W/2-50, 100, W/2+50, 220);
  numGrad.addColorStop(0, '#F0C95A');
  numGrad.addColorStop(0.5, '#D4A843');
  numGrad.addColorStop(1, '#8B5CF6');
  ctx.fillStyle = numGrad;
  ctx.fillText(String(data.number), W / 2, 190);

  // Master badge
  let yOffset = 220;
  if (data.master) {
    ctx.font = '400 12px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#a78bfa';
    ctx.fillText(`✦ ${t.masterNum} ${data.number}`, W / 2, yOffset);
    yOffset += 28;
  }

  // Title
  const titlePrimary = LANG === 'zh' ? data.title_zh : data.title_en;
  const titleSecondary = LANG === 'zh' ? data.title_en : data.title_zh;
  ctx.font = '700 28px "Noto Serif TC", serif';
  ctx.fillStyle = '#E8E0F0';
  ctx.fillText(titlePrimary, W / 2, yOffset + 10);
  ctx.font = '400 15px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(232,224,240,0.5)';
  ctx.fillText(titleSecondary, W / 2, yOffset + 38);

  // Divider
  const divY = yOffset + 60;
  ctx.strokeStyle = 'rgba(212,168,67,0.3)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(W/2 - 60, divY);
  ctx.lineTo(W/2 + 60, divY);
  ctx.stroke();

  // Element + Planet
  ctx.font = '400 13px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(232,224,240,0.5)';
  const el = LANG === 'zh' ? data.element_zh : data.element_en;
  const pl = LANG === 'zh' ? data.planet_zh : data.planet_en;
  ctx.fillText(`${t.element}：${el}  |  ${t.planet}：${pl}`, W / 2, divY + 28);

  // Personality excerpt
  const excerptY = divY + 65;
  ctx.font = '400 14px "Noto Serif TC", serif';
  ctx.fillStyle = 'rgba(232,224,240,0.7)';
  const pText = data.aspects.personality[LANG] || data.aspects.personality.zh;
  wrapText(ctx, pText, W / 2, excerptY, W - 100, 24);

  // Lucky info
  const luckyY = H - 140;
  ctx.font = '400 12px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(212,168,67,0.5)';
  ctx.fillText(t.luckyTitle, W / 2, luckyY);
  const colors = data.lucky.colors[LANG] || data.lucky.colors.zh;
  const crystal = data.lucky.crystal[LANG] || data.lucky.crystal.zh;
  ctx.font = '400 13px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(232,224,240,0.5)';
  ctx.fillText(`${colors.join(' · ')}  |  ${crystal}  |  ${data.lucky.numbers.join(', ')}`, W / 2, luckyY + 24);

  // Brand watermark
  ctx.font = '400 11px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(212,168,67,0.35)';
  ctx.fillText('福青施老師 | eliajhmauve.github.io/wenkai', W / 2, H - 24);

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lh) {
  let line = '';
  let lines = 0;
  const maxLines = 6;
  for (const ch of text) {
    if (ctx.measureText(line + ch).width > maxW && line) {
      ctx.fillText(line, x, y + lines * lh);
      line = ch; lines++;
      if (lines >= maxLines) { ctx.fillText('...', x, y + lines * lh); return lines + 1; }
    } else { line += ch; }
  }
  if (line) { ctx.fillText(line, x, y + lines * lh); lines++; }
  return lines;
}

function openShareModal() {
  const canvas = createShareCanvas();
  if (!canvas) return;
  const preview = document.getElementById('share-preview');
  preview.innerHTML = '';
  canvas.style.maxWidth = '100%';
  canvas.style.height = 'auto';
  canvas.style.borderRadius = '12px';
  preview.appendChild(canvas);
  document.getElementById('share-modal').classList.add('open');
}

function closeShareModal() {
  document.getElementById('share-modal').classList.remove('open');
}

function downloadCard() {
  const canvas = document.querySelector('#share-preview canvas');
  if (!canvas) return;
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `numerology-${currentResult.number}.png`;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

async function webShare() {
  const canvas = document.querySelector('#share-preview canvas');
  if (!canvas) return;
  const t = T[LANG];
  const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
  const file = new File([blob], `numerology-${currentResult.number}.png`, { type: 'image/png' });
  const title = LANG === 'zh' ? currentResult.title_zh : currentResult.title_en;
  const text = t.shareText.replace('{n}', currentResult.number).replace('{t}', title);
  const shareUrl = location.href;

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ title: t.shareTitle, text, url: shareUrl, files: [file] }); }
    catch (e) { if (e.name !== 'AbortError') downloadCard(); }
  } else {
    downloadCard();
  }
}

function shareResult() {
  openShareModal();
}
