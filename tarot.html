<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>吉伊卡哇塔羅牌 — 福青施老師</title>
  <meta name="description" content="78 張吉伊卡哇風格塔羅牌圖卡，含正逆位牌義、隨機抽牌功能。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060708;
      --bg-alt: #0a0b0d;
      --surface: rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(212,175,55,0.2);
      --text: #e8e4dc;
      --text-dim: #706b62;
      --gold: #c9a84c;
      --gold-light: #dfc06a;
      --radius: 12px;
      --font-serif: 'Noto Serif TC', serif;
      --font-sans: 'Noto Sans TC', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Nav */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(6,7,8,0.8);
      backdrop-filter: blur(30px);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nav-inner {
      max-width: 1400px; margin: 0 auto; padding: 16px 40px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo {
      font-family: var(--font-serif); font-size: 1rem; font-weight: 700;
      color: var(--gold); text-decoration: none; letter-spacing: 4px;
    }
    .nav-back {
      color: var(--text-dim); text-decoration: none; font-size: 0.82rem;
      letter-spacing: 1px; transition: color 0.3s;
    }
    .nav-back:hover { color: var(--text); }

    /* Hero */
    .tarot-hero {
      padding: 140px 24px 60px; text-align: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%);
    }
    .tarot-hero h1 {
      font-family: var(--font-serif); font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900; letter-spacing: 8px; margin-bottom: 12px;
      background: linear-gradient(135deg, var(--text) 0%, var(--gold-light) 50%, var(--text) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tarot-hero p {
      color: var(--text-dim); font-size: 0.88rem; letter-spacing: 2px; max-width: 500px; margin: 0 auto;
    }

    /* Actions */
    .actions {
      display: flex; justify-content: center; gap: 12px; margin: 32px 0 16px; flex-wrap: wrap; padding: 0 16px;
    }
    .btn {
      padding: 10px 24px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--text); font-size: 0.85rem;
      cursor: pointer; transition: all 0.3s; font-family: var(--font-sans);
      letter-spacing: 1px;
    }
    .btn:hover { border-color: var(--border-hover); background: var(--surface-hover); }
    .btn-gold {
      background: rgba(201,168,76,0.12); border-color: rgba(201,168,76,0.3); color: var(--gold);
    }
    .btn-gold:hover { background: rgba(201,168,76,0.2); }

    /* Filters */
    .filters {
      display: flex; justify-content: center; gap: 8px; padding: 0 16px 40px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 18px; border: 1px solid var(--border); border-radius: 20px;
      background: transparent; color: var(--text-dim); font-size: 0.78rem;
      cursor: pointer; transition: all 0.3s; font-family: var(--font-sans); letter-spacing: 1px;
    }
    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.12); }
    .filter-btn.active {
      background: rgba(201,168,76,0.12); border-color: rgba(201,168,76,0.3); color: var(--gold);
    }

    /* Card Grid */
    .card-grid {
      max-width: 1400px; margin: 0 auto; padding: 0 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    /* Tarot Card */
    .tarot-card {
      perspective: 1000px; cursor: pointer; aspect-ratio: 2/3;
    }
    .tarot-card.hidden { display: none; }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.6s cubic-bezier(0.16,1,0.3,1);
      transform-style: preserve-3d;
    }
    .tarot-card:hover .card-inner { transform: rotateY(8deg) scale(1.02); }
    .card-front, .card-back {
      position: absolute; inset: 0; border-radius: var(--radius);
      backface-visibility: hidden; overflow: hidden;
      border: 1px solid var(--border);
    }
    .card-front {
      background: var(--surface);
      display: flex; flex-direction: column;
    }
    .card-front img {
      width: 100%; flex: 1; object-fit: cover;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .card-front .card-label {
      padding: 8px 10px; text-align: center; font-size: 0.72rem;
      color: var(--text-dim); letter-spacing: 1px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      background: rgba(0,0,0,0.4);
    }
    .card-front .card-label strong {
      color: var(--gold); font-weight: 500;
    }
    .card-back {
      background: linear-gradient(135deg, #1a1520 0%, #0d0b12 100%);
      transform: rotateY(180deg);
      display: flex; align-items: center; justify-content: center;
      border-color: rgba(201,168,76,0.15);
    }
    .card-back-design {
      width: 60%; height: 70%; border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      background: repeating-conic-gradient(rgba(201,168,76,0.04) 0% 25%, transparent 0% 50%) 50%/20px 20px;
    }
    .card-back-design::after {
      content: '🔮'; font-size: 2rem;
    }

    /* Loading placeholder */
    .card-front img[data-src] {
      background: linear-gradient(135deg, rgba(201,168,76,0.05), rgba(201,168,76,0.02));
      min-height: 200px;
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-alt); border: 1px solid var(--border);
      border-radius: 16px; max-width: 800px; width: 100%;
      max-height: 90vh; overflow-y: auto; display: flex;
    }
    .modal-image {
      flex: 0 0 280px; padding: 24px;
    }
    .modal-image img {
      width: 100%; border-radius: var(--radius);
      border: 1px solid rgba(201,168,76,0.15);
    }
    .modal-content {
      flex: 1; padding: 32px 32px 32px 8px;
    }
    .modal-title {
      font-family: var(--font-serif); font-size: 1.5rem; font-weight: 700;
      color: var(--text); margin-bottom: 4px; letter-spacing: 2px;
    }
    .modal-subtitle {
      color: var(--gold); font-size: 0.85rem; letter-spacing: 2px; margin-bottom: 20px;
    }
    .modal-section { margin-bottom: 16px; }
    .modal-section h4 {
      font-family: var(--font-serif); font-size: 0.9rem; color: var(--gold);
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .modal-section p {
      font-size: 0.85rem; color: var(--text-dim); line-height: 1.8;
    }
    .modal-close {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; color: var(--text-dim);
      font-size: 1.5rem; cursor: pointer; transition: color 0.3s;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { color: var(--text); }

    /* Draw Modal */
    .draw-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
      flex-direction: column; align-items: center; justify-content: center; padding: 24px;
    }
    .draw-overlay.open { display: flex; }
    .draw-title {
      font-family: var(--font-serif); font-size: 1.3rem; color: var(--gold);
      margin-bottom: 24px; letter-spacing: 4px;
    }
    .draw-cards {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px;
    }
    .draw-card {
      width: 160px; aspect-ratio: 2/3; perspective: 1000px; cursor: pointer;
    }
    .draw-card .card-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.8s cubic-bezier(0.16,1,0.3,1);
      transform-style: preserve-3d;
    }
    .draw-card.flipped .card-inner { transform: rotateY(180deg); }
    .draw-card .card-front {
      transform: rotateY(180deg);
    }
    .draw-close {
      margin-top: 32px; padding: 10px 32px; border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px; background: rgba(201,168,76,0.1); color: var(--gold);
      font-size: 0.85rem; cursor: pointer; font-family: var(--font-sans); letter-spacing: 2px;
    }

    /* Search */
    .search-wrap {
      display: flex; justify-content: center; padding: 0 16px; margin-bottom: 16px;
    }
    .search-input {
      width: 100%; max-width: 400px; padding: 10px 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.85rem;
      font-family: var(--font-sans); outline: none; transition: border-color 0.3s;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: rgba(201,168,76,0.3); }

    /* Footer */
    .tarot-footer {
      padding: 60px 24px; text-align: center;
      border-top: 1px solid var(--border);
    }
    .tarot-footer a {
      color: var(--gold); text-decoration: none; font-family: var(--font-serif);
      font-size: 0.9rem; letter-spacing: 4px;
    }
    .tarot-footer p {
      color: var(--text-dim); font-size: 0.7rem; margin-top: 8px; opacity: 0.4;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
    @media (max-width: 768px) {
      .nav-inner { padding: 14px 20px; }
      .tarot-hero { padding: 120px 20px 40px; }
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px; padding: 0 12px 60px;
      }
      .modal { flex-direction: column; }
      .modal-image { flex: none; padding: 20px 20px 0; }
      .modal-content { padding: 20px; }
      .draw-card { width: 120px; }
    }
    @media (max-width: 480px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); }
      .draw-card { width: 100px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">福青施老師</a>

  <header class="tarot-hero">

  <div class="actions">
    <button class="btn btn-gold" onclick="drawCards(1)">抽一張</button>

    <button class="btn" onclick="drawCards(10)">凱爾特十字</button>

  <div class="search-wrap">

  </div>

  <div class="card-grid" id="cardGrid"></div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
    <div class="modal" style="position:relative">
      <button class="modal-close" onclick="closeDetail()">&times;</button>
      <div class="modal-image"><img id="modalImg" src="" alt=""></div>

        <div class="modal-section"><h4>逆位含義</h4><p id="modalReversed"></p></div>
        <div class="modal-section"><h4>關鍵詞</h4><p id="modalKeywords"></p></div>
      </div>
    </div>
  </div>

  <!-- Draw Modal -->
  <div class="draw-overlay" id="drawModal" onclick="if(event.target===this)closeDrawModal()">
    <div class="draw-title" id="drawTitle"></div>
    <div class="draw-cards" id="drawCards"></div>
    <button class="draw-close" onclick="closeDrawModal()">收起</button>
  </div>

  <footer class="tarot-footer">
    <a href="index.html">福青施老師</a>
    <p>&copy; 2026 All rights reserved.</p>
  </footer>

let currentFilter = 'all';
let searchText = '';

function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  CARDS.forEach((card, i) => {
    const matchFilter = currentFilter === 'all' || card.cat === currentFilter;
    const matchSearch = !searchText ||
      card.zh.includes(searchText) ||
      card.en.toLowerCase().includes(searchText.toLowerCase()) ||
      card.num.toLowerCase().includes(searchText.toLowerCase());
    const hidden = !(matchFilter && matchSearch);

    const div = document.createElement('div');
    div.className = 'tarot-card' + (hidden ? ' hidden' : '');
    div.dataset.index = i;
    div.onclick = () => openDetail(i);
    div.innerHTML = `
      <div class="card-inner">
        <div class="card-front">
          <img loading="lazy" src="${card.img}" alt="${card.zh} ${card.en}" onerror="this.style.background='linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03))';this.alt='${card.zh}'">
          <div class="card-label"><strong>${card.num}</strong> ${card.zh}</div>
        </div>
        <div class="card-back"><div class="card-back-design"></div></div>
      </div>`;
    grid.appendChild(div);
  });
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterCards() {
  searchText = document.querySelector('.search-input').value.trim();
  renderCards();
}

function openDetail(i) {
  const card = CARDS[i];
  document.getElementById('modalImg').src = card.img;
  document.getElementById('modalImg').alt = card.zh;
  document.getElementById('modalTitle').textContent = card.zh;
  document.getElementById('modalSubtitle').textContent = `${card.num} — ${card.en}`;
  document.getElementById('modalUpright').textContent = card.upright;
  document.getElementById('modalReversed').textContent = card.reversed;
  document.getElementById('modalKeywords').textContent = card.keywords;
  document.getElementById('detailModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
  document.body.style.overflow = '';
}

function drawCards(count) {
  const titles = {1: '每日一牌', 3: '過去・現在・未來', 10: '凱爾特十字牌陣'};
  document.getElementById('drawTitle').textContent = titles[count] || `抽 ${count} 張`;

  // Shuffle and pick
  const shuffled = [...CARDS].sort(() => Math.random() - 0.5);
  const drawn = shuffled.slice(0, count);

  const container = document.getElementById('drawCards');
  container.innerHTML = '';
  drawn.forEach((card, i) => {
    const isReversed = Math.random() > 0.5;
    const div = document.createElement('div');
    div.className = 'draw-card';
    div.onclick = () => {
      div.classList.add('flipped');
      setTimeout(() => openDetail(CARDS.indexOf(card)), 600);
    };
    div.innerHTML = `
      <div class="card-inner">
        <div class="card-back"><div class="card-back-design"></div></div>
        <div class="card-front" style="${isReversed ? 'transform:rotateY(180deg) rotateZ(180deg)' : 'transform:rotateY(180deg)'}">
          <img src="${card.img}" alt="${card.zh}" onerror="this.style.background='linear-gradient(135deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03))'">
          <div class="card-label"><strong>${card.num}</strong> ${card.zh}${isReversed ? ' (逆位)' : ''}</div>
        </div>
      </div>`;
    // Stagger animation
    div.style.opacity = '0';
    div.style.transform = 'translateY(20px)';
    div.style.transition = `opacity 0.5s ease ${i * 0.1}s, transform 0.5s ease ${i * 0.1}s`;
    container.appendChild(div);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      div.style.opacity = '1';
      div.style.transform = 'translateY(0)';
    }));
  });

  document.getElementById('drawModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawModal() {
  document.getElementById('drawModal').classList.remove('open');
  document.body.style.overflow = '';
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closeDrawModal(); }
});

// Init
renderCards();
</script>
</body>
</html>
