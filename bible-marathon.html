    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(6,7,8,0.9); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.04); }

    .hero h1 { font-family: var(--font-serif); font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; letter-spacing: 6px; margin-bottom: 12px; background: linear-gradient(135deg, var(--text) 0%, var(--gold-light) 50%, var(--text) 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    .plan-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.3s; }

    .plan-card .desc { font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; opacity: 0.7; }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }

    .progress-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }

    .progress-text { font-size: 0.8rem; color: var(--text-dim); display: flex; justify-content: space-between; }

    /* Today's Reading */

    .today-btn-secondary { background: none; border: 1px solid var(--border); color: var(--text-dim); }

    /* Calendar Heatmap */
    .calendar-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
    .calendar-section h3 { font-family: var(--font-serif); color: var(--gold); font-size: 1rem; margin-bottom: 14px; letter-spacing: 2px; }

    /* Share */
    .card-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
    .card-modal.open { display: flex; }

    @media (max-width: 768px) {

    @media (max-width: 480px) {
      .hero h1 { font-size: 1.6rem; }

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'wenkai_bible_marathon';

  // Reading plans (simplified — book:chapters format)
  const PLANS = {
    365: generatePlan365(),
    90: generatePlan90(),
    30: generatePlan30()
  };

  function generatePlan365() {
    const books = [
      ['創世記',50],['出埃及記',40],['利未記',27],['民數記',36],['申命記',34],
      ['約書亞記',24],['士師記',21],['路得記',4],['撒母耳記上',31],['撒母耳記下',24],
      ['列王紀上',22],['列王紀下',25],['歷代志上',29],['歷代志下',36],['以斯拉記',10],
      ['尼希米記',13],['以斯帖記',10],['約伯記',42],['詩篇',150],['箴言',31],
      ['傳道書',12],['雅歌',8],['以賽亞書',66],['耶利米書',52],['耶利米哀歌',5],
      ['以西結書',48],['但以理書',12],['何西阿書',14],['約珥書',3],['阿摩司書',9],
      ['俄巴底亞書',1],['約拿書',4],['彌迦書',7],['那鴻書',3],['哈巴谷書',3],
      ['西番雅書',3],['哈該書',2],['撒迦利亞書',14],['瑪拉基書',4],
      ['馬太福音',28],['馬可福音',16],['路加福音',24],['約翰福音',21],
      ['使徒行傳',28],['羅馬書',16],['哥林多前書',16],['哥林多後書',13],
      ['加拉太書',6],['以弗所書',6],['腓立比書',4],['歌羅西書',4],
      ['帖撒羅尼迦前書',5],['帖撒羅尼迦後書',3],['提摩太前書',6],['提摩太後書',4],
      ['提多書',3],['腓利門書',1],['希伯來書',13],['雅各書',5],
      ['彼得前書',5],['彼得後書',3],['約翰一書',5],['約翰二書',1],['約翰三書',1],
      ['猶大書',1],['啟示錄',22]
    ];
    const totalChapters = books.reduce((s, b) => s + b[1], 0); // 1189
    const perDay = Math.ceil(totalChapters / 365);
    const plan = [];
    let bookIdx = 0, chapIdx = 1;
    for (let d = 0; d < 365; d++) {
      let reading = [];
      let count = 0;
      while (count < perDay && bookIdx < books.length) {
        const [name, total] = books[bookIdx];
        const startCh = chapIdx;
        const remain = total - chapIdx + 1;
        const take = Math.min(remain, perDay - count);
        const endCh = chapIdx + take - 1;
        reading.push(`${name} ${startCh}${endCh > startCh ? '-' + endCh : ''}`);
        chapIdx += take;
        count += take;
        if (chapIdx > total) { bookIdx++; chapIdx = 1; }
      }
      plan.push(reading.join('、'));
    }
    return plan;
  }

  function generatePlan90() {
    const selections = [
      ['創世記 1-16','創世記 17-30','創世記 31-50'],
      ['出埃及記 1-20','出埃及記 21-40'],
      ['約書亞記 1-24'],['士師記 1-21'],['路得記 1-4'],
      ['撒母耳記上 1-31'],['撒母耳記下 1-24'],
      ['列王紀上 1-22'],['列王紀下 1-25'],
      ['以斯拉記 + 尼希米記'],['以斯帖記 1-10'],
      ['約伯記 1-21','約伯記 22-42'],
      ['詩篇 1-30','詩篇 31-60','詩篇 61-90','詩篇 91-120','詩篇 121-150'],
      ['箴言 1-15','箴言 16-31'],['傳道書 + 雅歌'],
      ['以賽亞書 1-22','以賽亞書 23-44','以賽亞書 45-66'],
      ['耶利米書 1-26','耶利米書 27-52 + 耶利米哀歌'],
      ['以西結書 1-24','以西結書 25-48'],
      ['但以理書 1-12'],['小先知書（上）','小先知書（下）'],
      ['馬太福音 1-14','馬太福音 15-28'],
      ['馬可福音 1-16'],
      ['路加福音 1-12','路加福音 13-24'],
      ['約翰福音 1-11','約翰福音 12-21'],
      ['使徒行傳 1-14','使徒行傳 15-28'],
      ['羅馬書 1-16'],['哥林多前書 + 後書'],
      ['加拉太書 + 以弗所書 + 腓立比書'],['歌羅西書 + 帖前 + 帖後'],
      ['提前 + 提後 + 提多 + 腓利門'],['希伯來書 1-13'],
      ['雅各書 + 彼前 + 彼後'],['約翰一二三書 + 猶大書'],['啟示錄 1-11','啟示錄 12-22']
    ];
    return selections.flat().slice(0, 90);
  }

  function generatePlan30() {
    return [
      '馬太福音 1-7','馬太福音 8-14','馬太福音 15-21','馬太福音 22-28',
      '馬可福音 1-8','馬可福音 9-16',
      '路加福音 1-6','路加福音 7-12','路加福音 13-18','路加福音 19-24',
      '約翰福音 1-7','約翰福音 8-14','約翰福音 15-21',
      '使徒行傳 1-9','使徒行傳 10-18','使徒行傳 19-28',
      '羅馬書 1-8','羅馬書 9-16',
      '哥林多前書 1-16','哥林多後書 1-13',
      '加拉太書 + 以弗所書','腓立比書 + 歌羅西書',
      '帖前 + 帖後 + 提前','提後 + 提多 + 腓利門',
      '希伯來書 1-13','雅各書 + 彼得前書',
      '彼得後書 + 約翰一二三書','猶大書 + 啟示錄 1-11',
      '啟示錄 12-22','複習與回顧'
    ];
  }

  // State
  function getState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  }
  function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function initState(planDays) {
    const state = getState();
    if (!state.plan || state.plan !== planDays) {
      return { plan: planDays, startDate: new Date().toISOString().split('T')[0], completed: [], streak: 0, lastCheckin: null };
    }
    return state;
  }

  let currentPlan = 365;
  let state = getState();
  if (state.plan) currentPlan = state.plan;
  else state = initState(365);

  // Plan selection
  document.querySelectorAll('.plan-card').forEach(card => {
    if (parseInt(card.dataset.plan) === currentPlan) card.classList.add('active');
    else card.classList.remove('active');
    card.addEventListener('click', () => {
      const p = parseInt(card.dataset.plan);
      if (p === currentPlan) return;
      if (state.completed?.length > 0) {
        if (!confirm(`切換到 ${p} 天計畫將重置進度，確定嗎？`)) return;
      }
      currentPlan = p;
      state = initState(p);
      saveState(state);
      document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      render();
    });
  });

  // Calculate current day
  function getCurrentDay() {
    if (!state.startDate) return 1;
    const start = new Date(state.startDate);
    const now = new Date();
    const diff = Math.floor((now - start) / 86400000);
    return Math.min(diff + 1, currentPlan);
  }

  function getStreak() {
    if (!state.completed?.length) return 0;
    const today = new Date().toISOString().split('T')[0];
    let streak = 0;
    let checkDate = new Date();
    // If checked in today, start from today, else from yesterday
    if (state.completed.includes(today)) {
      streak = 1;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      checkDate.setDate(checkDate.getDate() - 1);
    }
    while (true) {
      const ds = checkDate.toISOString().split('T')[0];
      if (state.completed.includes(ds)) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else break;
    }
    return streak;
  }

  function render() {
    const plan = PLANS[currentPlan];
    const day = getCurrentDay();
    const completed = state.completed || [];
    const doneCount = completed.length;
    const streak = getStreak();
    const percent = Math.round((doneCount / currentPlan) * 100);
    const today = new Date().toISOString().split('T')[0];
    const checkedToday = completed.includes(today);

    // Stats
    document.getElementById('statDone').textContent = doneCount;
    document.getElementById('statStreak').textContent = streak;
    document.getElementById('statPercent').textContent = percent + '%';
    document.getElementById('statRemain').textContent = currentPlan - doneCount;

    // Progress
    document.getElementById('progressBar').style.width = percent + '%';
    document.getElementById('progressLeft').textContent = `${doneCount} / ${currentPlan} 天`;
    document.getElementById('progressRight').textContent = percent + '%';

    // Today
    document.getElementById('todayDay').textContent = `第 ${day} 天（共 ${currentPlan} 天）`;
    document.getElementById('todayReading').textContent = plan[day - 1] || '恭喜完成所有讀經！';
    const btn = document.getElementById('checkinBtn');
    if (checkedToday) { btn.textContent = '今日已打卡 ✓'; btn.disabled = true; }
    else { btn.textContent = '打卡完成'; btn.disabled = false; }

    // Calendar
    renderCalendar(completed);
  }

  function renderCalendar(completed) {
    const grid = document.getElementById('calendarGrid');
    const now = new Date();
    const year = now.getFullYear(), month = now.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = now.getDate();

    const headers = ['日','一','二','三','四','五','六'];
    let html = headers.map(h => `<div class="cal-header">${h}</div>`).join('');
    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const done = completed.includes(ds);
      const isToday = d === today;
      html += `<div class="cal-day${done ? ' done' : ''}${isToday ? ' today' : ''}">${d}</div>`;
    }
    grid.innerHTML = html;
  }

  // Check-in
  document.getElementById('checkinBtn').addEventListener('click', () => {
    const today = new Date().toISOString().split('T')[0];
    if (!state.completed) state.completed = [];
    if (state.completed.includes(today)) return;
    state.completed.push(today);
    state.lastCheckin = today;
    saveState(state);
    render();
  });

  // Reset
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('確定要重置目前的讀經計畫？所有進度將清除。')) return;
    state = initState(currentPlan);
    state.completed = [];
    state.startDate = new Date().toISOString().split('T')[0];
    saveState(state);
    render();
  });

  // Share
  document.getElementById('shareBtn').addEventListener('click', () => {
    const completed = state.completed || [];
    const percent = Math.round((completed.length / currentPlan) * 100);
    const streak = getStreak();
    const card = ShareCard.templateInfo({
      title: `聖經讀經馬拉松 — ${currentPlan}天計畫`,
      items: [
        { label: '已完成天數', value: `${completed.length} / ${currentPlan}` },
        { label: '完成率', value: `${percent}%` },
        { label: '連續打卡', value: `${streak} 天` },
        { label: '今日讀經', value: (PLANS[currentPlan][getCurrentDay() - 1] || '').slice(0, 30) }
      ],
      footer: new Date().toLocaleDateString('zh-TW')
    });
    const modal = document.getElementById('cardModal');
    ShareCard.preview(card, document.getElementById('cardPreview'));
    modal.classList.add('open');
    modal._card = card;
  });

  document.getElementById('modalShareBtn').addEventListener('click', () => {
    const m = document.getElementById('cardModal');
    if (m._card) ShareCard.share(m._card, { title: '讀經馬拉松', filename: 'bible-marathon.png' });
  });
  document.getElementById('modalDownloadBtn').addEventListener('click', () => {
    const m = document.getElementById('cardModal');
    if (m._card) ShareCard.download(m._card, 'bible-marathon.png');
  });
  document.getElementById('modalCloseBtn').addEventListener('click', () => document.getElementById('cardModal').classList.remove('open'));
  document.getElementById('cardModal').addEventListener('click', (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

  // Init
  if (!state.plan) { state = initState(365); saveState(state); }
  render();
})();
</script>
</body>
</html>
